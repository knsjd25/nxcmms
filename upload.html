<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>隐私安全图床 | Secure Image Hosting - Mini-Tools</title>
    <meta name="description" content="Free secure image hosting with auto-destruction and VIP permanent storage. 免费隐私安全图床，支持限时阅后即焚与VIP永久存储。">
    <meta name="keywords" content="image hosting, secure image upload, temporary image, 隐私图床, 阅后即焚, 图片上传, 免费图床">
    <meta property="og:title" content="Secure Image Hosting - Mini-Tools">
    <meta property="og:description" content="Free, fast, and secure image hosting. 100% Privacy first.">
    <meta property="og:type" content="website">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <nav class="w-full bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-4 py-4 flex items-center">
            <a href="index.html" class="flex items-center text-blue-600 font-medium hover:text-blue-800 transition">
                <svg viewBox="0 0 24 24" class="w-5 h-5 mr-1" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                <span data-i18n="back">返回工具大厅</span>
            </a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4 py-10">
        <div class="w-full max-w-lg bg-white rounded-2xl shadow-lg border border-gray-100 p-6 sm:p-8">
            <h1 class="text-2xl font-bold text-center text-gray-900 mb-8" data-i18n="title">🔥 隐私安全图床</h1>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <span data-i18n="step1">1. 选择销毁时间</span> 
                        <span class="text-xs text-amber-500 font-normal ml-1" data-i18n="hint">(💡 如需永久保存，请联系站长获取 VIP 专属码)</span>
                    </label>
                    <select id="duration-select" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-gray-700">
                        <option value="1-day" data-i18n="opt1">1 天后自动销毁 (最安全)</option>
                        <option value="3-day" data-i18n="opt3">3 天后自动销毁</option>
                        <option value="7-day" data-i18n="opt7">7 天后自动销毁</option>
                        <option value="30-day" data-i18n="opt30">30 天后自动销毁</option>
                    </select>
                </div>

                <div class="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-lg">
                    <label class="block text-sm font-semibold text-amber-700 mb-2" data-i18n="vipLabel">👑 VIP 专属通道 (普通用户请留空)</label>
                    <input type="text" id="vip-id" data-i18n-ph="vipPlaceholder" placeholder="输入 VIP 专属码，解锁无限制永久保存" class="w-full px-4 py-2 bg-white border border-amber-200 rounded-md focus:ring-2 focus:ring-amber-400 outline-none transition text-sm">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2" data-i18n="step2">2. 选择图片 (最大支持 5MB)</label>
                    <input type="file" id="file-input" accept="image/png, image/jpeg, image/gif, image/webp" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-gray-700 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    <img id="preview-img" class="mt-4 w-full h-auto rounded-lg border border-gray-200 shadow-sm hidden">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2" data-i18n="step3">3. 人机安全验证</label>
                    <div class="cf-turnstile" data-sitekey="0x4AAAAAACu0xC_kU_xOZpH4"></div>
                </div>

                <button id="upload-btn" data-i18n="btnUpload" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
                    🔒 安全加密并上传
                </button>

                <div id="upload-log" data-i18n="logReady" class="w-full h-48 bg-gray-900 text-green-400 p-4 rounded-lg font-mono text-sm overflow-y-auto whitespace-pre-wrap leading-relaxed shadow-inner">就绪：等待选择图片...</div>
            </div>
        </div>
    </main>

<script>
    // 🌟 1. 多语言 (i18n) 纯前端字典引擎
    const i18n = {
        en: { back: "Back to Home", title: "🔥 Secure Image Hosting", step1: "1. Select Expiration Time", hint: "(💡 Contact admin for VIP code)", opt1: "Auto-destruct in 1 Day (Safest)", opt3: "Auto-destruct in 3 Days", opt7: "Auto-destruct in 7 Days", opt30: "Auto-destruct in 30 Days", vipLabel: "👑 VIP Channel (Leave blank if guest)", vipPlaceholder: "Enter VIP code for permanent storage", step2: "2. Select Image (Max 5MB)", step3: "3. Anti-Bot Verification", btnUpload: "🔒 Encrypt & Upload", logReady: "Ready: Waiting for image selection..." },
        zh: { back: "返回工具大厅", title: "🔥 隐私安全图床", step1: "1. 选择销毁时间", hint: "(💡 如需永久保存，请联系站长获取VIP码)", opt1: "1 天后自动销毁 (最安全)", opt3: "3 天后自动销毁", opt7: "7 天后自动销毁", opt30: "30 天后自动销毁", vipLabel: "👑 VIP 专属通道 (普通用户请留空)", vipPlaceholder: "输入 VIP 专属码，解锁永久保存", step2: "2. 选择图片 (最大支持 5MB)", step3: "3. 人机安全验证", btnUpload: "🔒 安全加密并上传", logReady: "就绪：等待选择图片..." },
        es: { back: "Volver a Inicio", title: "🔥 Hosting Seguro", step1: "1. Elegir Caducidad", hint: "(💡 Contacta al admin para código VIP)", opt1: "Autodestrucción en 1 Día", opt3: "Autodestrucción en 3 Días", opt7: "Autodestrucción en 7 Días", opt30: "Autodestrucción en 30 Días", vipLabel: "👑 Canal VIP (Dejar en blanco si invitado)", vipPlaceholder: "Introduce código VIP", step2: "2. Seleccionar Imagen (Max 5MB)", step3: "3. Verificación de Seguridad", btnUpload: "🔒 Subir de Forma Segura", logReady: "Listo: Esperando imagen..." },
        fr: { back: "Retour à l'Accueil", title: "🔥 Hébergement Sécurisé", step1: "1. Choisir l'Expiration", hint: "(💡 Contactez l'admin pour code VIP)", opt1: "Auto-destruction en 1 Jour", opt3: "Auto-destruction en 3 Jours", opt7: "Auto-destruction en 7 Jours", opt30: "Auto-destruction en 30 Jours", vipLabel: "👑 Canal VIP (Laisser vide si invité)", vipPlaceholder: "Entrez le code VIP", step2: "2. Sélectionner Image (Max 5MB)", step3: "3. Vérification de Sécurité", btnUpload: "🔒 Uploader en Sécurité", logReady: "Prêt : En attente de l'image..." },
        de: { back: "Zurück zur Startseite", title: "🔥 Sicheres Bildhosting", step1: "1. Ablaufzeit wählen", hint: "(💡 Kontaktieren Sie den Admin für VIP-Code)", opt1: "Zerstörung in 1 Tag", opt3: "Zerstörung in 3 Tagen", opt7: "Zerstörung in 7 Tagen", opt30: "Zerstörung in 30 Tagen", vipLabel: "👑 VIP-Kanal (Als Gast leer lassen)", vipPlaceholder: "VIP-Code eingeben", step2: "2. Bild wählen (Max 5MB)", step3: "3. Sicherheitsüberprüfung", btnUpload: "🔒 Sicher hochladen", logReady: "Bereit: Warte auf Bild..." }
    };

    // 智能获取语言 (URL 参数 > 本地存储 > 默认中文)
    const urlParams = new URLSearchParams(window.location.search);
    const currentLang = urlParams.get('lang') || localStorage.getItem('lang') || 'zh';
    
    // 瞬间应用翻译
    if (i18n[currentLang]) {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.innerText = i18n[currentLang][el.getAttribute('data-i18n')];
        });
        document.querySelectorAll('[data-i18n-ph]').forEach(el => {
            el.placeholder = i18n[currentLang][el.getAttribute('data-i18n-ph')];
        });
        document.documentElement.lang = currentLang;
    }

    // 🔴 极其重要：务必把这里换成你的 Worker 真实地址！
    const WORKER_URL = "https://pic-api.yuyananuu.workers.dev";
    
    const fileInput = document.getElementById('file-input');
    const durationSelect = document.getElementById('duration-select');
    const vipIdInput = document.getElementById('vip-id');
    const uploadBtn = document.getElementById('upload-btn');
    const logDiv = document.getElementById('upload-log');
    const previewImg = document.getElementById('preview-img');

    function log(msg, type = 'normal') {
        const span = document.createElement('span');
        // Tailwind 中日志颜色的兼容处理
        span.className = type === 'error' ? 'text-red-400 font-bold' : (type === 'success' ? 'text-green-400' : 'text-gray-300');
        span.innerText = msg + '\n';
        logDiv.appendChild(span);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // 监听文件选择与预览
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        // 严格限制前端文件大小 5MB
        if (file.size > 5242880) {
            log(currentLang === 'en' ? "❌ File exceeds 5MB limit." : "❌ 文件大小超过 5MB 的安全限制，请重新选择。", "error");
            fileInput.value = ""; 
            previewImg.style.display = 'none';
            return;
        }
        const reader = new FileReader();
        reader.onload = (event) => {
            previewImg.src = event.target.result;
            previewImg.style.display = 'block';
        };
        reader.readAsDataURL(file);
    });

    // 核心上传逻辑
    uploadBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) return log(currentLang === 'en' ? "⚠️ Please select an image first." : "⚠️ 操作无效：请先选择要上传的图片。", "error");
        
        const turnstileResponse = document.querySelector('[name="cf-turnstile-response"]').value;
        if (!turnstileResponse) return log(currentLang === 'en' ? "⚠️ Please complete bot verification." : "⚠️ 安全拦截：请先完成人机验证以证明您不是机器人。", "error");

        uploadBtn.disabled = true;
        logDiv.innerHTML = ""; 
        log(currentLang === 'en' ? `⏳ Uploading [${file.name}]...` : `⏳ 正在向安全节点传输文件 [${file.name}]...`);

        try {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('duration', durationSelect.value);
            formData.append('cf-turnstile-response', turnstileResponse);
            formData.append('vip_id', vipIdInput.value.trim());

            const response = await fetch(WORKER_URL, {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (response.ok && result.success) {
                const isEn = currentLang === 'en';
                const successMsg = result.isVip 
                    ? (isEn ? "🎉 VIP verified! Image saved permanently." : "🎉 尊贵的 VIP 身份验证成功！该图片已进入永久安全存储区。") 
                    : (isEn ? "🎉 Upload success!" : `🎉 上传成功！该图片将在 ${durationSelect.options[durationSelect.selectedIndex].text}。`);
                
                log(successMsg + '\n', "success");
                log(isEn ? `🌍 Image Link:\n${result.url}` : `🌍 您的专属图片直链：\n${result.url}`, "success");
                
                const link = document.createElement('a');
                link.href = result.url;
                link.target = '_blank';
                link.innerText = isEn ? "👉 Click here to view image" : "👉 点击此处在新标签页查看图片";
                link.className = "text-green-300 font-bold underline mt-2 block hover:text-green-200";
                logDiv.appendChild(link);
                
                fileInput.value = "";
                previewImg.style.display = 'none';
                if(typeof turnstile !== 'undefined') turnstile.reset();
            } else {
                log(`❌ Error: ${result.error}`, "error");
                if(typeof turnstile !== 'undefined') turnstile.reset();
            }
        } catch (error) {
            log(`❌ Network Error: ${error.message}`, "error");
            if(typeof turnstile !== 'undefined') turnstile.reset();
        } finally {
            uploadBtn.disabled = false;
        }
    });
</script>
</body>
</html>
