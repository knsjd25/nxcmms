<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Mini-Tools - 限时阅后即焚图床</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f9f9f9; }
        .upload-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .upload-container h1 { font-size: 1.5rem; margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        .form-group select, .form-group input[type="text"], .form-group input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .contact-hint { font-size: 0.8rem; color: #e67e22; font-weight: normal; margin-left: 5px; }
        #upload-btn { background: #007bff; color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 5px; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        #upload-btn:hover { background: #0056b3; }
        #upload-btn:disabled { background: #aaa; cursor: not-allowed; }
        #upload-log { margin-top: 20px; padding: 10px; background: #222; color: #0f0; border-radius: 5px; font-family: monospace; font-size: 0.9rem; white-space: pre-wrap; word-wrap: break-word; max-height: 200px; overflow-y: auto;}
        .log-error { color: #ff4d4d; }
        .log-success { color: #00ff00; }
        #preview-img { max-width: 100%; margin-top: 10px; border-radius: 5px; display: none; }
        .vip-box { border-left: 3px solid #f39c12; padding-left: 10px; background: #fdfbf7; padding: 10px; border-radius: 0 5px 5px 0; }
    </style>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>

<div class="upload-container">
    <h1>🔥 限时隐私图床 (免费版)</h1>
    
    <div class="form-group">
        <label>1. 选择销毁时间 <span class="contact-hint">(💡 如需永久保存，请联系管理员获取专属码)</span></label>
        <select id="duration-select">
            <option value="1-day">1 天后自动销毁</option>
            <option value="3-day">3 天后自动销毁</option>
            <option value="7-day">7 天后自动销毁</option>
            <option value="30-day">30 天后自动销毁 (最长)</option>
        </select>
    </div>

    <div class="form-group vip-box">
        <label>👑 VIP 专属通道 (游客请留空)</label>
        <input type="text" id="vip-id" placeholder="输入管理员分配的专属码，解锁永久保存">
    </div>

    <div class="form-group">
        <label>2. 选择图片 (最大 5MB)</label>
        <input type="file" id="file-input" accept="image/png, image/jpeg, image/gif, image/webp">
        <img id="preview-img">
    </div>

    <div class="form-group">
        <label>3. 人机安全验证</label>
        <div class="cf-turnstile" data-sitekey="0x4AAAAAACu0xC_kU_xOZpH4"></div>
    </div>

    <button id="upload-btn">加密并上传</button>

    <div id="upload-log">等待选择图片...</div>
</div>

<script>
    // 🔴 极其重要：务必把这里换成你的 Worker 真实地址！千万别带最后的斜杠！
    const WORKER_URL = "https://pic-api.yuyananuu.workers.dev";
    
    const fileInput = document.getElementById('file-input');
    const durationSelect = document.getElementById('duration-select');
    const vipIdInput = document.getElementById('vip-id');
    const uploadBtn = document.getElementById('upload-btn');
    const logDiv = document.getElementById('upload-log');
    const previewImg = document.getElementById('preview-img');

    function log(msg, type = 'normal') {
        const span = document.createElement('span');
        span.className = type === 'error' ? 'log-error' : (type === 'success' ? 'log-success' : '');
        span.innerText = msg + '\n';
        logDiv.appendChild(span);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // 监听文件选择与预览
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        // 严格限制前端文件大小
        if (file.size > 5242880) {
            log("❌ 文件超过 5MB 限制，请重新选择。", "error");
            fileInput.value = ""; 
            previewImg.style.display = 'none';
            return;
        }
        const reader = new FileReader();
        reader.onload = (event) => {
            previewImg.src = event.target.result;
            previewImg.style.display = 'block';
        };
        reader.readAsDataURL(file);
    });

    // 核心上传逻辑
    uploadBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) return log("⚠️ 请先选择图片。", "error");
        
        const turnstileResponse = document.querySelector('[name="cf-turnstile-response"]').value;
        if (!turnstileResponse) return log("⚠️ 请先完成人机验证。", "error");

        uploadBtn.disabled = true;
        logDiv.innerHTML = ""; 
        log(`⏳ 正在向安全节点上传 [${file.name}]...`);

        try {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('duration', durationSelect.value);
            formData.append('cf-turnstile-response', turnstileResponse);
            
            // 🌟 核心改动：把用户输入的 VIP 码传给后端
            formData.append('vip_id', vipIdInput.value.trim());

            const response = await fetch(WORKER_URL, {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (response.ok && result.success) {
                // 如果后端返回了 isVip 标志，说明触发了永久保存
                const successMsg = result.isVip ? "🎉 VIP 身份验证成功！图片已进入永久存储区。" : `🎉 上传成功！将在 ${durationSelect.options[durationSelect.selectedIndex].text}。`;
                log(successMsg + '\n', "success");
                log(`🌍 专属访问链接:\n${result.url}`, "success");
                
                const link = document.createElement('a');
                link.href = result.url;
                link.target = '_blank';
                link.innerText = "👉 点击此处查看或复制链接";
                link.style.color = "#00ff00";
                logDiv.appendChild(link);
                
                // 上传成功后清理表单
                fileInput.value = "";
                previewImg.style.display = 'none';
                if(typeof turnstile !== 'undefined') turnstile.reset();
            } else {
                log(`❌ 服务器拒绝上传: ${result.error}`, "error");
                if(typeof turnstile !== 'undefined') turnstile.reset();
            }
        } catch (error) {
            log("❌ 发生网络错误: " + error.message, "error");
            if(typeof turnstile !== 'undefined') turnstile.reset();
        } finally {
            uploadBtn.disabled = false;
        }
    });
</script>
</body>
</html>
