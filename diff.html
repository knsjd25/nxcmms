<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Text Compare & Diff — Mini-Tools.uk</title>
  <script async src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    .diff-added { background-color: #dcfce7; color: #166534; text-decoration: none; }
    .diff-removed { background-color: #fee2e2; color: #991b1b; text-decoration: line-through; }
    .editor-font { font-family: 'Monaco', 'Consolas', monospace; }
    pre { white-space: pre-wrap; word-wrap: break-word; }
  </style>
</head>
<body>

  <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <a href="/" id="home-link" class="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center text-white font-black shadow">M</a>
        <span class="text-xl font-extrabold text-slate-900 leading-none">Mini-Tools<span class="text-blue-600">.uk</span></span>
      </div>
      <select id="lang-select" class="bg-slate-100 px-3 py-1.5 rounded-lg text-sm font-bold outline-none cursor-pointer">
        <option value="en">🇬🇧 English</option>
        <option value="zh">🇨🇳 简体中文</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="de">🇩🇪 Deutsch</option>
      </select>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-6 py-12">
    <div class="mb-10 text-center">
      <h1 id="page-title" class="text-3xl font-extrabold text-slate-900 mb-2">Text Compare</h1>
      <p id="page-desc" class="text-slate-500">Compare two texts and highlight the differences instantly.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
      <div class="space-y-2">
        <label id="label-original" class="text-xs font-black text-slate-400 uppercase tracking-widest px-2">Original Text</label>
        <textarea id="text-1" class="editor-font w-full h-64 p-4 bg-white border border-slate-200 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Paste original text here..."></textarea>
      </div>
      <div class="space-y-2">
        <label id="label-modified" class="text-xs font-black text-slate-400 uppercase tracking-widest px-2">Modified Text</label>
        <textarea id="text-2" class="editor-font w-full h-64 p-4 bg-white border border-slate-200 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Paste modified text here..."></textarea>
      </div>
    </div>

    <div class="flex justify-center mb-12">
      <button id="btn-compare" onclick="compareTexts()" class="px-12 py-4 bg-slate-900 hover:bg-black text-white font-black rounded-2xl shadow-xl transition-all active:scale-95 text-lg">
        Compare Now
      </button>
    </div>

    <div id="result-container" class="hidden space-y-4">
      <h2 id="label-result" class="text-xl font-extrabold text-slate-900">Comparison Result</h2>
      <div id="diff-output" class="bg-white p-8 rounded-3xl border border-slate-100 shadow-inner editor-font text-sm leading-relaxed min-h-[200px]"></div>
    </div>
  </main>

  <script>
    const i18n = {
      en: {
        title: "Text Compare", desc: "Compare two texts and find differences.",
        original: "Original Text", modified: "Modified Text", btn: "Compare Now",
        res: "Comparison Result", placeholder: "Paste text here..."
      },
      zh: {
        title: "文本对比", desc: "对比两段文字，即时发现增加、删除或修改的内容。",
        original: "原文本", modified: "修改后的文本", btn: "开始对比",
        res: "对比结果", placeholder: "在此粘贴文本..."
      },
      es: {
        title: "Comparar Texto", desc: "Compara dos textos y encuentra las diferencias.",
        original: "Texto Original", modified: "Texto Modificado", btn: "Comparar Ahora",
        res: "Resultado de la Comparación", placeholder: "Pegue el texto aquí..."
      },
      fr: {
        title: "Comparer le Texte", desc: "Comparez deux textes et trouvez les différences.",
        original: "Texte Original", modified: "Texte Modifié", btn: "Comparer",
        res: "Résultat de la Comparaison", placeholder: "Collez le texte ici..."
      },
      de: {
        title: "Textvergleich", desc: "Vergleichen Sie zwei Texte und finden Sie Unterschiede.",
        original: "Originaltext", modified: "Geänderter Text", btn: "Jetzt Vergleichen",
        res: "Vergleichsergebnis", placeholder: "Text hier einfügen..."
      }
    };

    function getLang() {
      return new URLSearchParams(window.location.search).get('lang') || 'en';
    }

    function updateLanguage() {
      const lang = getLang();
      const data = i18n[lang] || i18n['en'];

      document.getElementById('page-title').innerText = data.title;
      document.getElementById('page-desc').innerText = data.desc;
      document.getElementById('label-original').innerText = data.original;
      document.getElementById('label-modified').innerText = data.modified;
      document.getElementById('btn-compare').innerText = data.btn;
      document.getElementById('label-result').innerText = data.res;
      document.getElementById('text-1').placeholder = data.placeholder;
      document.getElementById('text-2').placeholder = data.placeholder;
      
      document.getElementById('lang-select').value = lang;
      document.getElementById('home-link').href = "/?lang=" + lang;
    }

    function compareTexts() {
      const one = document.getElementById('text-1').value;
      const other = document.getElementById('text-2').value;
      const output = document.getElementById('diff-output');
      const container = document.getElementById('result-container');

      // 使用 jsdiff 进行单词级对比
      const diff = Diff.diffWords(one, other);
      
      output.innerHTML = "";
      container.classList.remove('hidden');

      diff.forEach((part) => {
        const span = document.createElement('span');
        if (part.added) {
          span.className = "diff-added";
          span.innerText = part.value;
        } else if (part.removed) {
          span.className = "diff-removed";
          span.innerText = part.value;
        } else {
          span.innerText = part.value;
        }
        output.appendChild(span);
      });

      // 自动滚动到结果区
      container.scrollIntoView({ behavior: 'smooth' });
    }

    document.getElementById('lang-select').addEventListener('change', (e) => {
      window.location.href = `?lang=${e.target.value}`;
    });

    window.onload = updateLanguage;
  </script>
</body>
</html>
