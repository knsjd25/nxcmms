    function updateLanguage() {
      const params = new URLSearchParams(window.location.search);
      let lang = params.get('lang');
      if (!lang) {
        const navLang = navigator.language.split('-')[0];
        lang = ['en', 'zh', 'es', 'fr', 'de'].includes(navLang) ? navLang : 'en';
      }
      
      const data = i18n[lang] || i18n['en'];

      document.documentElement.lang = lang;
      
      // 🌟 动态接管 Meta 数据
      document.title = data.metaTitle;
      document.querySelector('meta[name="description"]').setAttribute("content", data.metaDesc);
      document.querySelector('meta[name="keywords"]').setAttribute("content", data.metaKeywords);

      // Update Navigation Links
      document.getElementById('nav-home').innerText = data.navHome;
      document.getElementById('nav-about').innerText = data.navAbout;
      document.getElementById('nav-blog').innerText = data.navBlog;
      document.getElementById('nav-contact').innerText = data.navContact;

      // Hero text
      document.getElementById('hero-tag').innerText = data.tag;
      document.getElementById('hero-title').innerText = data.title;
      document.getElementById('hero-sub').innerText = data.sub;

      // 🌟 动态注入重写后的全站合规隐私条款
      const seoContainer = document.getElementById('seo-container');
      if (data.policyHtml) {
          seoContainer.style.opacity = 0;
          setTimeout(() => {
              seoContainer.innerHTML = data.policyHtml;
              seoContainer.style.opacity = 1;
          }, 150);
      }

      document.getElementById('lang-select').value = lang;

      // Sync links (Ensure .html is removed)
      document.querySelectorAll('a').forEach(link => {
        // Do not alter external links (like Google policies)
        const href = link.getAttribute('href');
        if (href && !href.startsWith('http') && !href.startsWith('mailto') && (href.startsWith('/') || (!href.includes(':') && !href.startsWith('#')))) {
          try {
            const url = new URL(href, window.location.origin);
            url.searchParams.set('lang', lang);
            link.href = url.pathname + url.search;
          } catch(e) {}
        }
      });
    }

    document.getElementById('lang-select').addEventListener('change', (e) => {
      const url = new URL(window.location.href);
      url.searchParams.set('lang', e.target.value);
      window.location.href = url.href;
    });

    window.onload = updateLanguage;
  </script>
