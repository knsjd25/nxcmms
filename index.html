<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini-Tools — 20+ Free Online Utilities (PAYE, VAT, AI Prompt, QR)</title>
  <meta name="description" content="Mini-Tools — 20+ lightweight free online utilities. No sign-up, privacy-first." />
  
  <link rel="canonical" href="https://mini-tools.uk/" />
  <script async src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root{--brand:#0ea5e9}
    body { font-family: 'Plus Jakarta Sans', ui-sans-serif, sans-serif; background-color: #f8fafc; }
    .uk-glow { border-top: 5px solid #005ea5; box-shadow: 0 4px 15px rgba(0, 94, 165, 0.08); }
    .tool-card { transition: all .25s ease; }
    .tool-card:hover { transform: translateY(-6px); box-shadow: 0 12px 30px rgba(0,0,0,0.06); }
    .hot-tag { background: linear-gradient(90deg,#ff4d4d,#f97316); color:#fff; padding:3px 8px; border-radius:999px; font-weight:800; font-size:10px; position:absolute; top:12px; right:12px; }
  </style>
</head>
<body>

  <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <a href="/" class="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center text-white font-black shadow" id="nav-logo">M</a>
        <div class="flex flex-col -mt-1">
          <span class="text-xl font-extrabold text-slate-900 leading-none">Mini-Tools<span class="text-blue-600">.uk</span></span>
          <span class="text-[10px] text-green-600 font-bold uppercase tracking-widest mt-1">100% Free</span>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <select id="lang-select" class="bg-slate-100 px-3 py-1.5 rounded-lg text-sm font-bold outline-none cursor-pointer border-none">
          <option value="en">🇬🇧 English</option>
          <option value="zh">🇨🇳 简体中文</option>
          <option value="es">🇪🇸 Español</option>
          <option value="fr">🇫🇷 Français</option>
          <option value="de">🇩🇪 Deutsch</option>
        </select>
      </div>
    </div>
  </nav>

  <header class="max-w-7xl mx-auto pt-20 pb-12 px-6 text-center lg:text-left flex flex-col lg:flex-row items-center justify-between gap-12">
    <div class="lg:w-3/5">
      <div class="inline-block px-4 py-1.5 bg-blue-50 text-blue-600 rounded-full text-xs font-bold mb-6 italic tracking-wider">#1 UK Utility Toolbox</div>
      <h1 id="hero-title" class="text-4xl lg:text-6xl font-extrabold text-slate-900 mb-4 leading-tight">
        </h1>
      <p id="hero-sub" class="text-lg text-slate-500 mb-6 max-w-2xl leading-relaxed">
        </p>
    </div>
    <div class="lg:w-2/5 hidden lg:block">
      <img src="https://cdn-icons-png.flaticon.com/512/9167/9167014.png" class="w-64 h-64 mx-auto drop-shadow-xl" alt="Tools Illustration">
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 pb-32">
    <div id="tools-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      </div>
  </main>

  <script>
    const i18n = {
      en: {
        hero: "Smart & <span class='text-blue-600'>Free Tools</span> for Daily Tasks.",
        sub: "Unlock 20+ lightweight utilities. No registration required, privacy-first, and optimized for UK users.",
        hot: "HOT", open: "Launch Tool",
        tools: {
          tax: { t: "Income Tax (PAYE)", d: "UK Salary & Tax take-home calc.", img: "https://cdn-icons-png.flaticon.com/512/3135/3135706.png", hot: true },
          vat: { t: "VAT Calculator", d: "Add or remove VAT (HMRC standards).", img: "https://cdn-icons-png.flaticon.com/512/10433/10433048.png", hot: false },
          prompt: { t: "AI Prompt Helper", d: "Improve LLM prompts instantly.", img: "https://cdn-icons-png.flaticon.com/512/10696/10696515.png", hot: true },
          mortgage: { t: "Mortgage Calc", d: "Estimate monthly UK house payments.", img: "https://cdn-icons-png.flaticon.com/512/3475/3475306.png", hot: false },
          qr: { t: "QR Generator", d: "Create clean, custom QR codes.", img: "https://cdn-icons-png.flaticon.com/512/241/241528.png", hot: false },
          unit: { t: "Unit Converter", d: "Metric & Imperial quick swap.", img: "https://cdn-icons-png.flaticon.com/512/6127/6127623.png", hot: false },
          word: { t: "Word Counter", d: "Real-time char & word counting.", img: "https://cdn-icons-png.flaticon.com/512/2541/2541991.png", hot: false },
          pass: { t: "Password Gen", d: "Secure, random password tool.", img: "https://cdn-icons-png.flaticon.com/512/2889/2889676.png", hot: false },
          pdf: { t: "PDF to Image", d: "Extract pages as JPG/PNG.", img: "https://cdn-icons-png.flaticon.com/512/337/337946.png", hot: true },
          json: { t: "JSON Formatter", d: "Clean up and validate JSON code.", img: "https://cdn-icons-png.flaticon.com/512/136/136525.png", hot: false },
          diff: { t: "Text Diff Checker", d: "Compare two texts for changes.", img: "https://cdn-icons-png.flaticon.com/512/2911/2911230.png", hot: false },
          image: { t: "Image Resizer", d: "Compress & resize images fast.", img: "https://cdn-icons-png.flaticon.com/512/2916/2916124.png", hot: false }
          // ... 可以继续按此格式添加至20个
        }
      },
      zh: {
        hero: "智能且<span class='text-blue-600'>免费</span>的实用工具箱",
        sub: "解锁超过20个轻量级在线工具。无需注册，隐私第一，专为高效办公设计。",
        hot: "热门", open: "开启工具",
        tools: {
          tax: { t: "个税计算 (PAYE)", d: "计算英国实际薪资与个税详情。", img: "https://cdn-icons-png.flaticon.com/512/3135/3135706.png", hot: true },
          vat: { t: "增值税计算 (VAT)", d: "符合英国标准的含税/不含税计算。", img: "https://cdn-icons-png.flaticon.com/512/10433/10433048.png", hot: false },
          prompt: { t: "AI 提示词助手", d: "快速优化你的 AI 提示词指令。", img: "https://cdn-icons-png.flaticon.com/512/10696/10696515.png", hot: true },
          mortgage: { t: "房贷计算器", d: "估算英国房屋贷款月供金额。", img: "https://cdn-icons-png.flaticon.com/512/3475/3475306.png", hot: false },
          qr: { t: "二维码生成", d: "创建简洁、自定义的二维码。", img: "https://cdn-icons-png.flaticon.com/512/241/241528.png", hot: false },
          unit: { t: "单位换算", d: "公制与英制单位快速转换。", img: "https://cdn-icons-png.flaticon.com/512/6127/6127623.png", hot: false },
          word: { t: "字数统计", d: "实时统计文本字符与单词数。", img: "https://cdn-icons-png.flaticon.com/512/2541/2541991.png", hot: false },
          pass: { t: "密码生成器", d: "生成高强度随机安全密码。", img: "https://cdn-icons-png.flaticon.com/512/2889/2889676.png", hot: false },
          pdf: { t: "PDF 转图片", d: "快速将 PDF 页面提取为图片。", img: "https://cdn-icons-png.flaticon.com/512/337/337946.png", hot: true },
          json: { t: "JSON 格式化", d: "整理并验证 JSON 代码格式。", img: "https://cdn-icons-png.flaticon.com/512/136/136525.png", hot: false },
          diff: { t: "文本比对", d: "比对两段文本的差异之处。", img: "https://cdn-icons-png.flaticon.com/512/2911/2911230.png", hot: false },
          image: { t: "图片调优", d: "快速压缩或调整图片尺寸。", img: "https://cdn-icons-png.flaticon.com/512/2916/2916124.png", hot: false }
        }
      }
    };

    function getLang() {
      const params = new URLSearchParams(window.location.search);
      // 如果 URL 没参数，尝试获取浏览器语言
      let lang = params.get('lang');
      if (!lang) {
        const navLang = navigator.language.split('-')[0];
        lang = i18n[navLang] ? navLang : 'en';
      }
      return lang;
    }

    // 关键函数：让页面上所有内部链接都自动带上 ?lang= 参数
    function syncLinks(lang) {
      document.querySelectorAll('a').forEach(link => {
        const href = link.getAttribute('href');
        if (href && (href.startsWith('/') || !href.includes(':')) && !href.startsWith('#')) {
          try {
            const url = new URL(href, window.location.origin);
            url.searchParams.set('lang', lang);
            link.href = url.pathname + url.search;
          } catch(e) {}
        }
      });
    }

    function updateUI() {
      const lang = getLang();
      const data = i18n[lang] || i18n['en'];
      
      document.getElementById('hero-title').innerHTML = data.hero;
      document.getElementById('hero-sub').innerText = data.sub;
      document.getElementById('lang-select').value = lang;

      const grid = document.getElementById('tools-grid');
      const toolKeys = Object.keys(data.tools);
      
      grid.innerHTML = toolKeys.map(key => {
        const tool = data.tools[key];
        return `
          <a class="tool-link" href="/${key}.html">
            <div class="tool-card relative bg-white p-8 rounded-2xl border border-slate-100 flex flex-col items-start h-full">
              ${tool.hot ? `<span class="hot-tag">${data.hot}</span>` : ''}
              <div class="w-14 h-14 mb-6 bg-slate-50 rounded-xl flex items-center justify-center">
                <img src="${tool.img}" class="w-9 h-9" alt="${tool.t}">
              </div>
              <h3 class="font-extrabold text-xl text-slate-900 mb-2">${tool.t}</h3>
              <p class="text-sm text-slate-500 leading-relaxed mb-6">${tool.d}</p>
              <div class="mt-auto text-blue-600 font-bold text-xs uppercase flex items-center gap-1">
                ${data.open} →
              </div>
            </div>
          </a>`;
      }).join('');

      // 执行链接同步
      syncLinks(lang);
    }

    // 切换语言时，直接刷新页面并带上新参数
    document.getElementById('lang-select').addEventListener('change', (e) => {
      const newLang = e.target.value;
      const url = new URL(window.location.href);
      url.searchParams.set('lang', newLang);
      window.location.href = url.href;
    });

    window.onload = updateUI;
  </script>
</body>
</html>
