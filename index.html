    function getLang() {
      const params = new URLSearchParams(window.location.search);
      let lang = params.get('lang');
      if (!lang) {
        const navLang = navigator.language.split('-')[0];
        lang = i18n[navLang] ? navLang : 'en';
      }
      return lang;
    }

    function syncLinks(lang) {
      document.querySelectorAll('a').forEach(link => {
        const href = link.getAttribute('href');
        if (href && (href.startsWith('/') || !href.includes(':')) && !href.startsWith('#')) {
          try {
            const url = new URL(href, window.location.origin);
            url.searchParams.set('lang', lang);
            link.href = url.pathname + url.search;
          } catch(e) {}
        }
      });
    }

    function updateUI() {
      const lang = getLang();
      const data = i18n[lang] || i18n['en'];
      
      document.getElementById('hero-title').innerHTML = data.hero;
      document.getElementById('hero-sub').innerText = data.sub;
      document.getElementById('lang-select').value = lang;

      const grid = document.getElementById('tools-grid');
      const toolKeys = Object.keys(data.tools);
      
      grid.innerHTML = toolKeys.map(key => {
        const tool = data.tools[key];
        return `
          <a class="tool-link" href="/${key}.html">
            <div class="tool-card relative bg-white p-8 rounded-2xl border border-slate-100 flex flex-col items-start h-full">
              ${tool.hot ? `<span class="hot-tag">${data.hot}</span>` : ''}
              <div class="w-14 h-14 mb-6 bg-slate-50 rounded-xl flex items-center justify-center">
                <img src="${tool.img}" class="w-9 h-9" alt="${tool.t}">
              </div>
              <h3 class="font-extrabold text-xl text-slate-900 mb-2">${tool.t}</h3>
              <p class="text-sm text-slate-500 leading-relaxed mb-6">${tool.d}</p>
              <div class="mt-auto text-blue-600 font-bold text-xs uppercase flex items-center gap-1">
                ${data.open} →
              </div>
            </div>
          </a>`;
      }).join('');

      syncLinks(lang);
    }

    document.getElementById('lang-select').addEventListener('change', (e) => {
      const newLang = e.target.value;
      const url = new URL(window.location.href);
      url.searchParams.set('lang', newLang);
      window.location.href = url.href;
    });

    window.onload = updateUI;
