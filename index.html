<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1197299128201700"
     crossorigin="anonymous"></script>
  <meta charset="utf-8" />

  <title>Mini-Tools — Home</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{--brand:#0ea5e9}
    body { font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background-color: #f8fafc; }
    .uk-glow { border-top: 5px solid #005ea5; box-shadow: 0 4px 15px rgba(0, 94, 165, 0.08); }
    .tool-card { transition: transform .25s cubic-bezier(.4,0,.2,1), box-shadow .25s; }
    .tool-card:hover { transform: translateY(-6px); box-shadow: 0 8px 28px rgba(15,23,42,0.06); }
    .hot-tag { background: linear-gradient(90deg,#ff4d4d,#f97316); color:#fff; padding:4px 8px; border-radius:999px; font-weight:800; font-size:11px; position:absolute; top:12px; right:12px; }
    .free-badge { color:#16a34a; font-weight:700; font-size:0.75rem; text-transform:uppercase; letter-spacing:.06em; }
    a.tool-link { text-decoration:none; color:inherit; display:block; }
  </style>
</head>
<body>
  <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <a href="index.html" class="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center text-white font-black shadow">M</a>
        <div class="flex flex-col -mt-1">
          <span class="text-xl font-extrabold text-slate-900 leading-none">Mini-Tools<span class="text-blue-600">.uk</span></span>
          <span class="free-badge">100% Free Forever</span>

      </div>
      <div class="flex items-center gap-4">
        <select id="lang-select" class="bg-slate-100 px-3 py-1.5 rounded-lg text-sm font-bold outline-none">
          <option value="en">🇬🇧 English</option>
          <option value="zh">🇨🇳 简体中文</option>
          <option value="es">🇪🇸 Español</option>
          <option value="fr">🇫🇷 Français</option>
          <option value="de">🇩🇪 Deutsch</option>
        </select>
        <div id="region-badge" class="hidden md:block px-3 py-1 bg-blue-50 text-blue-700 rounded-full text-[10px] font-black italic">DETECTING...</div>
      </div>
    </div>
  </nav>

  <header class="max-w-7xl mx-auto pt-20 pb-12 px-6 text-center lg:text-left flex flex-col lg:flex-row items-center justify-between gap-12">
    <div class="lg:w-3/5">
      <div class="inline-block px-4 py-1.5 bg-green-100 text-green-700 rounded-full text-xs font-bold mb-6 italic tracking-wider">#1 Free Online Tools Hub in the UK</div>
      <h2 id="hero-title" class="text-4xl lg:text-6xl font-extrabold text-slate-900 mb-4 leading-tight">
        Smart & <span class="text-blue-600">Free Tools</span> for everyone.
      </h2>
      <p id="hero-sub" class="text-lg text-slate-500 mb-6 max-w-2xl leading-relaxed">
        Unlock 20+ lightweight utilities. No registration, privacy-first.
      </p>
      <div class="flex flex-wrap gap-2 text-xs text-slate-400 font-medium opacity-80">
        <span>Trending:</span>
        <span class="underline">PAYE Calculator</span> • <span>VAT Checker</span> • <span>AI Prompting</span> • <span>QR Generator</span> • <span>Unit Converter</span>
      </div>
    </div>

    <div class="lg:w-2/5 hidden lg:block">
      <div class="relative">
        <div class="absolute -inset-6 bg-blue-100 rounded-full blur-3xl opacity-50"></div>
        <img src="https://cdn-icons-png.flaticon.com/512/9167/9167014.png" class="relative w-64 h-64 mx-auto drop-shadow-lg" alt="Illustration">
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 pb-32">
    <div id="tools-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
  </main>

  <script>
    // ---------- i18n 数据（en/zh/es/fr/de） ----------
    const i18n = {
      en: {
        hero_uk: "Essential UK<br><span class='text-blue-600'>Digital Toolbox.</span>",
        hero_intl: "100% Free Online<br><span class='text-blue-600'>Utility Toolkit.</span>",
        region_uk: "📍 UK OPTIMIZED",
        region_intl: "🌐 GLOBAL VERSION",
        open: "Launch Tool",
        hot: "HOT",
        tools: {
          tax: { t: "Income Tax (PAYE)", d: "UK Salary & Tax take-home calc.", img: "https://cdn-icons-png.flaticon.com/512/3135/3135706.png", uk: true, hot: true },
          prompt: { t: "AI Prompt Helper", d: "Improve LLM prompts quickly.", img: "https://cdn-icons-png.flaticon.com/512/10696/10696515.png", uk: false, hot: true },
          vat: { t: "VAT Calculator", d: "HMRC-style VAT tool.", img: "https://cdn-icons-png.flaticon.com/512/10433/10433048.png", uk: true, hot: false },
          mortgage: { t: "Mortgage Calc", d: "Estimate monthly payments.", img: "https://cdn-icons-png.flaticon.com/512/3475/3475306.png", uk: true, hot: false },
          calc: { t: "Smart Calculator", d: "General & scientific math.", img: "https://cdn-icons-png.flaticon.com/512/2311/2311893.png", uk: false, hot: false },
          unit: { t: "Unit Converter", d: "Imperial ↔ Metric conversions.", img: "https://cdn-icons-png.flaticon.com/512/6127/6127623.png", uk: false, hot: false },
          word: { t: "Word Counter", d: "Real-time character count.", img: "https://cdn-icons-png.flaticon.com/512/2541/2541991.png", uk: false, hot: false },
          password: { t: "Password Gen", d: "Generate secure passwords.", img: "https://cdn-icons-png.flaticon.com/512/2889/2889676.png", uk: false, hot: false }
        }
      },
      zh: {
        hero_uk: "适配英国生活的<br><span class='text-blue-600'>核心实用工具。</span>",
        hero_intl: "100% 免费<br><span class='text-blue-600'>在线实用工具箱。</span>",
        region_uk: "📍 英国优化版",
        region_intl: "🌐 全球访问版",
        open: "开启工具",
        hot: "热门",
        tools: {
          tax: { t: "个税计算 (PAYE)", d: "计算英国实际薪资与个税。", img: "https://cdn-icons-png.flaticon.com/512/3135/3135706.png", uk: true, hot: true },
          prompt: { t: "AI 提示词助手", d: "快速生成高质量提示词。", img: "https://cdn-icons-png.flaticon.com/512/10696/10696515.png", uk: false, hot: true },
          vat: { t: "增值税 (VAT)", d: "计算含税/不含税/税额。", img: "https://cdn-icons-png.flaticon.com/512/10433/10433048.png", uk: true, hot: false },
          mortgage: { t: "房贷计算", d: "估算按揭月供。", img: "https://cdn-icons-png.flaticon.com/512/3475/3475306.png", uk: true, hot: false },
          calc: { t: "全能计算器", d: "多用途数学工具。", img: "https://cdn-icons-png.flaticon.com/512/2311/2311893.png", uk: false, hot: false },
          unit: { t: "单位换算", d: "公制与英制互换。", img: "https://cdn-icons-png.flaticon.com/512/6127/6127623.png", uk: false, hot: false },
          word: { t: "字数统计", d: "实时统计字符与词数。", img: "https://cdn-icons-png.flaticon.com/512/2541/2541991.png", uk: false, hot: false },
          password: { t: "密码生成器", d: "生成高强度随机密码。", img: "https://cdn-icons-png.flaticon.com/512/2889/2889676.png", uk: false, hot: false }
        }
      },
      es: {
        hero_intl: "Herramientas <span class='text-blue-600'>Online Gratis.</span>",
        open: "Abrir",
        hot: "NUEVO",
        region_intl: "🌐 Versión global",
        region_uk: "📍 Optimizado para UK",
        tools: {
          tax: { t: "Calculadora Impuestos", d: "Sueldo neto en Reino Unido.", img: "https://cdn-icons-png.flaticon.com/512/3135/3135706.png", uk: true, hot: true },
          prompt: { t: "AI Ayudante", d: "Optimizar prompts de IA.", img: "https://cdn-icons-png.flaticon.com/512/10696/10696515.png", uk: false, hot: true }
        }
      },
      fr: {
        hero_uk: "Boîte à outils numérique essentielle<br><span class='text-blue-600'>pour le Royaume-Uni.</span>",
        hero_intl: "100% Gratuit en ligne<br><span class='text-blue-600'>Boîte à outils pratique.</span>",
        region_uk: "📍 Optimisé pour le Royaume-Uni",
        region_intl: "🌐 Version internationale",
        open: "Ouvrir",
        hot: "POPULAIRE",
        tools: {
          tax: { t: "Impôt sur le revenu (PAYE)", d: "Calcul du salaire net et des impôts au Royaume-Uni.", img: "https://cdn-icons-png.flaticon.com/512/3135/3135706.png", uk: true, hot: true },
          prompt: { t: "Assistant de prompt IA", d: "Optimisez rapidement les prompts pour les LLM.", img: "https://cdn-icons-png.flaticon.com/512/10696/10696515.png", uk: false, hot: true },
          vat: { t: "Calculateur de TVA", d: "Outil TVA conforme aux normes HMRC.", img: "https://cdn-icons-png.flaticon.com/512/10433/10433048.png", uk: true, hot: false },
          mortgage: { t: "Calculateur de prêt immobilier", d: "Estimez les mensualités de prêt au Royaume-Uni.", img: "https://cdn-icons-png.flaticon.com/512/3475/3475306.png", uk: true, hot: false },
          calc: { t: "Calculatrice intelligente", d: "Mathématiques générales et scientifiques.", img: "https://cdn-icons-png.flaticon.com/512/2311/2311893.png", uk: false, hot: false },
          unit: { t: "Convertisseur d'unités", d: "Conversions Impérial ↔ Métrique.", img: "https://cdn-icons-png.flaticon.com/512/6127/6127623.png", uk: false, hot: false },
          word: { t: "Compteur de mots", d: "Comptage en temps réel des caractères et des mots.", img: "https://cdn-icons-png.flaticon.com/512/2541/2541991.png", uk: false, hot: false },
          password: { t: "Générateur de mot de passe", d: "Génère des mots de passe sécurisés.", img: "https://cdn-icons-png.flaticon.com/512/2889/2889676.png", uk: false, hot: false }
        }
      },
      de: {
        hero_uk: "Essentielles digitales Toolkit<br><span class='text-blue-600'>für das Vereinigte Königreich.</span>",
        hero_intl: "100% kostenlos online<br><span class='text-blue-600'>Nützliche Werkzeug-Box.</span>",
        region_uk: "📍 Für UK optimiert",
        region_intl: "🌐 Globale Version",
        open: "Öffnen",
        hot: "BELIEBT",
        tools: {
          tax: { t: "Einkommensteuer (PAYE)", d: "UK Gehalts- und Nettolohnrechner.", img: "https://cdn-icons-png.flaticon.com/512/3135/3135706.png", uk: true, hot: true },
          prompt: { t: "KI Prompt-Helfer", d: "LLM-Prompts schnell optimieren.", img: "https://cdn-icons-png.flaticon.com/512/10696/10696515.png", uk: false, hot: true },
          vat: { t: "Mehrwertsteuer (VAT)", d: "HMRC-konformer VAT-Rechner.", img: "https://cdn-icons-png.flaticon.com/512/10433/10433048.png", uk: true, hot: false },
          mortgage: { t: "Hypothekenrechner", d: "Monatliche Raten schätzen.", img: "https://cdn-icons-png.flaticon.com/512/3475/3475306.png", uk: true, hot: false },
          calc: { t: "Smart Rechner", d: "Allgemeine & wissenschaftliche Mathematik.", img: "https://cdn-icons-png.flaticon.com/512/2311/2311893.png", uk: false, hot: false },
          unit: { t: "Einheitenumrechner", d: "Imperial ↔ Metrisch Umrechnungen.", img: "https://cdn-icons-png.flaticon.com/512/6127/6127623.png", uk: false, hot: false },
          word: { t: "Wortzähler", d: "Echtzeit Zeichen- und Wortzählung.", img: "https://cdn-icons-png.flaticon.com/512/2541/2541991.png", uk: false, hot: false },
          password: { t: "Passwort-Generator", d: "Sichere Zufallspasswörter erzeugen.", img: "https://cdn-icons-png.flaticon.com/512/2889/2889676.png", uk: false, hot: false }
        }
      }
    };

    // 小保护：若没有定义 fr/de（历史原因），兜底为 en
    if(!i18n.fr) i18n.fr = JSON.parse(JSON.stringify(i18n.en));
    if(!i18n.de) i18n.de = JSON.parse(JSON.stringify(i18n.en));

    let currentLang = 'en';
    let isUK = false;
    const supportedLangs = ['en','zh','es','fr','de'];

    function detectLang(){
      try{
        const navLang = (navigator.languages && navigator.languages[0]) || navigator.language || 'en';
        const l = String(navLang).toLowerCase();
        if(l.startsWith('zh')) currentLang = 'zh';
        else if(l.startsWith('es')) currentLang = 'es';
        else if(l.startsWith('fr')) currentLang = 'fr';
        else if(l.startsWith('de')) currentLang = 'de';
        else currentLang = 'en';
      }catch(e){ currentLang = 'en'; }
      if(!supportedLangs.includes(currentLang)) currentLang = 'en';
      const sel = document.getElementById('lang-select');
      if(sel) sel.value = currentLang;
    }

    function detectRegion() {
      try {
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
        if (tz.toLowerCase().includes("london") || tz.toLowerCase().includes("europe/london")) isUK = true;
      } catch (e) { isUK = false; }
      const badge = document.getElementById('region-badge');
      if (badge) badge.classList.remove('hidden');
      updateUI();
    }

    function renderTools() {
      const grid = document.getElementById('tools-grid');
      const langData = i18n[currentLang] || i18n['en'];
      const data = (langData && langData.tools) ? langData.tools : i18n['en'].tools;
      const openText = (langData && langData.open) ? langData.open : (i18n['en'].open || 'Open');
      const hotText = (langData && langData.hot) ? langData.hot : (i18n['en'].hot || 'HOT');

      const toolList = Object.keys(data).map(key => ({ id: key, ...data[key] }));
      toolList.sort((a,b) => isUK ? (b.uk - a.uk) : ((b.hot?1:0) - (a.hot?1:0)));

      grid.innerHTML = toolList.map(tool => {
        const enTool = i18n.en.tools[tool.id] || {};
        const title = tool.t || enTool.t || tool.id;
        const desc = tool.d || enTool.d || '';
        const img = tool.img || enTool.img || '';
        const isUkTool = (typeof tool.uk === 'boolean') ? tool.uk : (enTool.uk || false);
        const isHot = (typeof tool.hot === 'boolean') ? tool.hot : (enTool.hot || false);

        return `
        <a class="tool-link" href="${tool.id}.html">
          <div class="tool-card relative bg-white p-8 rounded-2xl border border-slate-100 flex flex-col items-start h-full ${ (isUkTool && isUK) ? 'uk-glow' : '' }">
            ${ isHot ? `<span class="hot-tag">${hotText}</span>` : '' }
            <div class="w-16 h-16 mb-6 bg-slate-50 rounded-2xl flex items-center justify-center">
              <img src="${img}" class="w-10 h-10" alt="">
            </div>
            <h3 class="font-extrabold text-xl text-slate-900 mb-2">${title}</h3>
            <p class="text-sm text-slate-500 leading-relaxed mb-6">${desc}</p>
            <div class="mt-auto text-blue-600 font-bold text-xs uppercase tracking-tighter flex items-center gap-2">
              ${openText}
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
            </div>
          </div>
        </a>`;
      }).join('');
    }

    function updateUI() {
      const langData = i18n[currentLang] || i18n['en'];
      const hero = document.getElementById('hero-title');
      if (hero) hero.innerHTML = isUK ? (langData.hero_uk || langData.hero_intl || i18n.en.hero_intl) : (langData.hero_intl || i18n.en.hero_intl);
      const badge = document.getElementById('region-badge');
      if (badge) badge.innerText = isUK ? (langData.region_uk || i18n.en.region_uk) : (langData.region_intl || i18n.en.region_intl);
      renderTools();
    }

    function changeLang() {
      const sel = document.getElementById('lang-select');
      if (!sel) return;
      let v = sel.value || 'en';
      if (!supportedLangs.includes(v)) v = 'en';
      currentLang = v;
      updateUI();
    }

    document.addEventListener('DOMContentLoaded', () => {
      const sel = document.getElementById('lang-select');
      if (sel) sel.addEventListener('change', changeLang);
      detectLang();
      detectRegion();
    });
  </script>
</body>
</html>
