        // 核心 JavaScript 逻辑
        function changeLanguage(lang, updateUrl = false) {
            const data = i18n[lang] || i18n.en;
            
            // 1. 更新 SEO 元标签 (对爬虫最重要)
            document.title = data.title;
            document.querySelector('meta[name="description"]').setAttribute('content', data.seoDesc);
            document.getElementById('seoH1').innerText = data.seoH1;
            document.body.dir = (lang === 'ar') ? 'rtl' : 'ltr';

            // 2. 更新页面文字内容
            document.getElementById('badge').innerText = data.badge;
            document.getElementById('title').innerText = data.titleText;
            document.getElementById('subtitle').innerText = data.subtitle;
            document.getElementById('uploadText').innerText = data.uploadText;
            document.getElementById('styleLabel').innerText = data.styleLabel;
            document.getElementById('genBtn').innerText = data.genBtn;
            document.getElementById('seoHeading').innerText = data.seoHeading;
            document.getElementById('seoBody').innerHTML = data.seoBody;
            document.getElementById('howHeading').innerText = data.howHeading;
            document.getElementById('howList').innerHTML = data.howList;
            
            const styleKeys = ['style1', 'style2', 'style3', 'style4'];
            document.querySelectorAll('[data-key]').forEach((el, index) => {
                el.innerText = data[styleKeys[index]];
            });

            // 3. 更新 URL 参数（不刷新页面），方便爬虫识别
            if (updateUrl && window.history.pushState) {
                const newurl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?lang=' + lang;
                window.history.pushState({path:newurl},'',newurl);
            }
        }

        function selectStyle(btn) {
            document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('selected-style'));
            btn.classList.add('selected-style');
        }

        // 图片预览逻辑
        document.getElementById('imageInput').addEventListener('change', function(e){
            const file = e.target.files[0];
            if(!file) return;
            const url = URL.createObjectURL(file);
            document.getElementById('uploadPreview').innerHTML = `<img src="${url}" alt="Room Preview" class="mx-auto rounded-2xl mt-4 max-h-64 shadow-lg animate__animated animate__fadeIn">`;
        });

        // 模拟生成按钮
        function startGenerate() {
            const preview = document.getElementById('uploadPreview').querySelector('img');
            if(!preview) { alert('Please upload a photo!'); return; }
            const btn = document.getElementById('genBtn');
            btn.disabled = true;
            btn.innerText = "AI is thinking...";
            setTimeout(() => {
                alert("AI Server connected! Your design is being prepared.");
                btn.disabled = false;
                btn.innerText = i18n[document.getElementById('langSwitcher').value].genBtn;
            }, 2000);
        }

        // 页面加载自动检测
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const langParam = urlParams.get('lang');
            const userLang = navigator.language.substring(0, 2);
            const defaultLang = i18n[langParam] ? langParam : (i18n[userLang] ? userLang : 'en');
            
            document.getElementById('langSwitcher').value = defaultLang;
            document.getElementById('year').innerText = new Date().getFullYear();
            changeLanguage(defaultLang);
        };
