<body class="bg-[#f8fafc] min-h-screen text-slate-800 flex flex-col">

  <div class="fixed top-4 right-4 z-50">
    <select id="langSwitcher" onchange="changeLanguage(this.value)" class="glass px-3 py-2 rounded-full text-sm font-semibold border-none shadow-md cursor-pointer focus:ring-2 ring-indigo-500">
      <option value="en">English</option>
      <option value="zh">简体中文</option>
      <option value="es">Español</option>
      <option value="jp">日本語</option>
      <option value="ko">한국어</option>
      <option value="pt">Português</option>
      <option value="de">Deutsch</option>
      <option value="fr">Français</option>
      <option value="ru">Русский</option>
    </select>
  </div>

  <header class="max-w-3xl mx-auto py-12 px-6 text-center">
    <span id="badge" class="px-3 py-1 text-xs font-semibold text-indigo-600 bg-indigo-50 rounded-full uppercase tracking-wider">AI Powered</span>
    <h1 id="title" class="text-4xl font-bold tracking-tight mt-4 mb-2 bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600">DecorAI — Transform your room with AI in seconds</h1>
    <p id="subtitle" class="text-slate-600 text-lg leading-relaxed">Upload a photo, choose a style, and get AI-generated design previews for your home renovation.</p>
  </header>

  <main class="flex-grow max-w-2xl mx-auto px-6 pb-16 w-full">
    <section class="glass p-8 rounded-3xl shadow-xl">
      <div class="mb-6">
        <label for="imageInput" class="block w-full border-2 border-dashed border-slate-300 rounded-2xl p-8 text-center cursor-pointer hover:border-indigo-400 hover:bg-indigo-50/30 transition-all">
          <div id="uploadText" class="text-sm font-medium text-slate-600">Click or drag to upload room photo</div>
          <input type="file" id="imageInput" class="hidden" accept="image/*" />
        </label>
        <div id="uploadPreview" class="mt-4 text-center"></div>
      </div>

      <div class="mb-8">
        <label id="styleLabel" class="block text-sm font-semibold text-slate-700 mb-4 px-1">Select Interior Style</label>
        <div class="grid grid-cols-2 gap-3">
          <button class="style-btn border-2 border-slate-100 bg-white p-3 rounded-xl text-sm transition-all" onclick="selectStyle(this)">✨ <span data-key="style1">Modern</span></button>
          <button class="style-btn border-2 border-slate-100 bg-white p-3 rounded-xl text-sm transition-all" onclick="selectStyle(this)">🌿 <span data-key="style2">Nordic</span></button>
          <button class="style-btn border-2 border-slate-100 bg-white p-3 rounded-xl text-sm transition-all" onclick="selectStyle(this)">🧁 <span data-key="style3">Creamy</span></button>
          <button class="style-btn border-2 border-slate-100 bg-white p-3 rounded-xl text-sm transition-all" onclick="selectStyle(this)">🏭 <span data-key="style4">Industrial</span></button>
        </div>
      </div>

      <button onclick="startGenerate()" id="genBtn" class="gradient-btn w-full text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:opacity-90 transition-all">Generate My Design</button>
    </section>

    <div id="loadingState" class="mt-10 hidden text-center italic text-slate-400 animate__animated animate__pulse animate__infinite">
      <p id="loadingText">AI is painting your room...</p>
    </div>

    <section class="mt-16 bg-white/50 p-8 rounded-3xl border border-white/20">
      <h2 id="seoHeading" class="text-2xl font-bold text-slate-800 mb-4 tracking-tight">Best Free AI Interior Design Tool</h2>
      <div id="seoBody" class="text-slate-600 leading-relaxed space-y-4">
        </div>
    </section>

    <section class="mt-12 px-2">
      <h2 id="howHeading" class="text-xl font-bold mb-4">How it works</h2>
      <ul id="howList" class="list-disc list-inside text-slate-600 space-y-2">
        </ul>
    </section>
  </main>

  <footer class="w-full py-12 px-6 border-t border-slate-200 bg-white text-center">
    <div class="max-w-2xl mx-auto">
      <p class="text-[10px] text-slate-400 mb-6 uppercase tracking-[0.2em]">Sponsored</p>
      
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-1968324079765567"
           data-ad-slot="YOUR_AD_SLOT_ID"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      
      <p class="mt-10 text-xs text-slate-400">© <span id="year"></span> mini-tools.uk — All Rights Reserved.</p>
    </div>
  </footer>

  <script>
    document.getElementById('year').innerText = new Date().getFullYear();

    const i18n = {
      zh: {
        badge: "AI 驱动装修", title: "DecorAI 装修大师", subtitle: "上传照片，AI 瞬间重构梦想家园", uploadText: "点击或拖拽上传房间照片",
        styleLabel: "选择装修风格", style1: "现代简约", style2: "北欧木质", style3: "温柔奶油", style4: "工业复古",
        genBtn: "立即生成新风格", loadingText: "AI 正在粉刷墙壁，请稍候...",
        seoHeading: "顶尖 AI 室内设计工具，让家居改造触手可及",
        seoBody: "<p>正在寻找 <strong>AI 装修</strong> 灵感吗？DecorAI 是一款专业级的 <strong>AI 房间改造</strong> 工具，旨在几秒钟内让您的家焕然一新。无论您是在计划全面装修，还是只想尝试一种新的 <strong>家装风格</strong>，我们的生成式 AI 都能为您提供高品质的梦想空间视觉方案。</p><p>我们支持包括 <strong>现代简约</strong>、<strong>北欧木质</strong>、<strong>工业风</strong> 和 <strong>温柔奶油风</strong> 在内的流行趋势。只需上传一张照片，剩下的交给 AI 即可——让 <strong>AI 房屋设计</strong> 变得简单且免费。</p>",
        howHeading: "操作步骤",
        howList: "<li>上传一张清晰的房间照片</li><li>选择您心仪的室内设计风格</li><li>点击生成并保存您的 AI 效果图</li>"
      },
      en: {
        badge: "AI Powered", title: "DecorAI Master", subtitle: "AI-powered room transformation in seconds", uploadText: "Click or drag to upload room photo",
        styleLabel: "Select Interior Style", style1: "Modern", style2: "Nordic", style3: "Creamy", style4: "Industrial",
        genBtn: "Generate My Design", loadingText: "AI is painting your room, please wait...",
        seoHeading: "Leading AI Interior Design Tool for Home Makeovers",
        seoBody: "<p>Looking for <strong>AI interior design</strong> ideas? DecorAI is a professional-grade <strong>AI room makeover</strong> tool designed to transform your home in seconds. Get instant <strong>home decor</strong> inspiration and high-quality visualizations of your dream room.</p><p>Our platform supports <strong>Modern</strong>, <strong>Nordic</strong>, <strong>Industrial</strong>, and <strong>Creamy</strong> aesthetics. Upload a photo and let our AI handle the rest—making <strong>AI house design</strong> accessible to everyone.</p>",
        howHeading: "How it works",
        howList: "<li>Upload a clear photo of your room</li><li>Choose your preferred interior style</li><li>Generate and download your AI-powered design</li>"
      }
    };

    function changeLanguage(lang) {
      const data = i18n[lang] || i18n.en;
      document.getElementById('badge').innerText = data.badge;
      document.getElementById('title').innerText = data.title;
      document.getElementById('subtitle').innerText = data.subtitle;
      document.getElementById('uploadText').innerText = data.uploadText;
      document.getElementById('styleLabel').innerText = data.styleLabel;
      document.getElementById('genBtn').innerText = data.genBtn;
      document.getElementById('loadingText').innerText = data.loadingText;
      document.getElementById('seoHeading').innerText = data.seoHeading;
      document.getElementById('seoBody').innerHTML = data.seoBody;
      document.getElementById('howHeading').innerText = data.howHeading;
      document.getElementById('howList').innerHTML = data.howList;
      
      const styleKeys = ['style1', 'style2', 'style3', 'style4'];
      document.querySelectorAll('[data-key]').forEach((el, index) => {
        el.innerText = data[styleKeys[index]];
      });
    }

    // 样式选择视觉反馈
    function selectStyle(btn) {
      document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('border-indigo-500', 'bg-indigo-50'));
      btn.classList.add('border-indigo-500', 'bg-indigo-50');
    }

    // 文件预览
    document.getElementById('imageInput').addEventListener('change', function(e){
      const file = e.target.files[0];
      if(!file) return;
      const url = URL.createObjectURL(file);
      document.getElementById('uploadPreview').innerHTML = `<img src="${url}" class="mx-auto rounded-2xl mt-4 max-h-64 shadow-lg animate__animated animate__fadeIn">`;
    });

    // 模拟生成
    function startGenerate() {
      const preview = document.getElementById('uploadPreview').querySelector('img');
      if(!preview) { alert('Please upload a photo first!'); return; }
      document.getElementById('genBtn').disabled = true;
      document.getElementById('loadingState').classList.remove('hidden');
      setTimeout(() => {
        alert("API Integration Ready! Replace this with your backend call.");
        document.getElementById('genBtn').disabled = false;
        document.getElementById('loadingState').classList.add('hidden');
      }, 3000);
    }

    window.onload = () => {
      const userLang = navigator.language.substring(0, 2);
      const defaultLang = i18n[userLang] ? userLang : 'en';
      document.getElementById('langSwitcher').value = defaultLang;
      changeLanguage(defaultLang);
    };
  </script>
</body>
