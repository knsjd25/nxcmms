<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UK VAT Calculator — Mini-Tools.uk</title>
  <script async src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    .result-card { background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); color: white; }
    .active-rate { border-color: #2563eb; background-color: #eff6ff; color: #1e40af; }
  </style>
</head>
<body>

  <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <a href="/" id="home-link" class="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center text-white font-black shadow">M</a>
        <span class="text-xl font-extrabold text-slate-900 leading-none">Mini-Tools<span class="text-blue-600">.uk</span></span>
      </div>
      <select id="lang-select" class="bg-slate-100 px-3 py-1.5 rounded-lg text-sm font-bold outline-none cursor-pointer">
        <option value="en">🇬🇧 English</option>
        <option value="zh">🇨🇳 简体中文</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="de">🇩🇪 Deutsch</option>
      </select>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-6 py-12">
    <div class="mb-10 text-center lg:text-left">
      <h1 id="page-title" class="text-3xl font-extrabold text-slate-900 mb-2">VAT Calculator</h1>
      <p id="page-desc" class="text-slate-500">Add or remove VAT (Value Added Tax) based on UK HMRC standards.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
        <div class="mb-6">
          <label id="label-amount" class="block text-sm font-bold text-slate-700 mb-2">Amount (£)</label>
          <input type="number" id="amount-input" placeholder="0.00" class="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-xl font-bold focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div class="mb-6">
          <label id="label-rate" class="block text-sm font-bold text-slate-700 mb-2">VAT Rate</label>
          <div class="grid grid-cols-3 gap-3">
            <button onclick="setRate(20, this)" class="rate-btn py-3 rounded-xl border-2 active-rate font-bold text-sm">20%</button>
            <button onclick="setRate(5, this)" class="rate-btn py-3 rounded-xl border border-slate-200 text-slate-600 font-bold text-sm">5%</button>
            <input type="number" id="custom-rate" placeholder="Other" class="py-3 px-2 rounded-xl border border-slate-200 text-center text-sm font-bold outline-none focus:border-blue-500" oninput="setRate(this.value, null)">
          </div>
        </div>

        <div class="flex gap-4 mb-8">
          <button id="btn-add" onclick="calculateVAT('add')" class="flex-1 py-4 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-2xl shadow-lg transition-all active:scale-95">Add VAT</button>
          <button id="btn-remove" onclick="calculateVAT('remove')" class="flex-1 py-4 bg-slate-800 hover:bg-slate-900 text-white font-black rounded-2xl shadow-lg transition-all active:scale-95">Remove VAT</button>
        </div>
      </div>

      <div id="result-area" class="result-card p-8 rounded-3xl shadow-2xl flex flex-col justify-between hidden">
        <div>
          <p id="res-label-total" class="text-blue-100 font-bold text-sm uppercase tracking-widest mb-1">Total Amount</p>
          <h2 id="final-amount" class="text-5xl font-black text-white mb-6">£0.00</h2>
          
          <div class="space-y-4 border-t border-white/20 pt-6 text-sm">
            <div class="flex justify-between">
              <span id="res-label-net" class="text-blue-100">Net Amount</span>
              <span id="val-net" class="font-bold">£0.00</span>
            </div>
            <div class="flex justify-between">
              <span id="res-label-vat" class="text-blue-100">VAT Amount</span>
              <span id="val-vat" class="font-bold">£0.00</span>
            </div>
          </div>
        </div>
        <div class="mt-8 p-4 bg-black/10 rounded-2xl text-xs text-blue-50 italic">
          * Standard UK VAT rate is 20%. Reduced rate is 5%.
        </div>
      </div>
    </div>
  </main>

  <script>
    const i18n = {
      en: {
        title: "VAT Calculator", desc: "Add or remove VAT based on UK standards.",
        labelAmount: "Amount (£)", labelRate: "VAT Rate",
        btnAdd: "Add VAT", btnRemove: "Remove VAT",
        resTotal: "Total Amount", resNet: "Net Amount", resVAT: "VAT Amount"
      },
      zh: {
        title: "增值税计算器 (VAT)", desc: "根据英国标准快速添加或扣除增值税。",
        labelAmount: "金额 (£)", labelRate: "增值税率",
        btnAdd: "加税", btnRemove: "减税",
        resTotal: "总金额", resNet: "净额 (不含税)", resVAT: "税额"
      },
      es: {
        title: "Calculadora de IVA", desc: "Añadir o quitar el IVA según los estándares.",
        labelAmount: "Cantidad (£)", labelRate: "Tasa de IVA",
        btnAdd: "Añadir IVA", btnRemove: "Quitar IVA",
        resTotal: "Cantidad Total", resNet: "Importe Neto", resVAT: "Importe del IVA"
      },
      fr: {
        title: "Calculateur de TVA", desc: "Ajoutez ou retirez la TVA selon les normes.",
        labelAmount: "Montant (£)", labelRate: "Taux de TVA",
        btnAdd: "Ajouter TVA", btnRemove: "Retirer TVA",
        resTotal: "Montant Total", resNet: "Montant Net", resVAT: "Montant de la TVA"
      },
      de: {
        title: "MwSt-Rechner", desc: "MwSt hinzufügen oder abziehen nach Standards.",
        labelAmount: "Betrag (£)", labelRate: "MwSt-Satz",
        btnAdd: "MwSt hinzufügen", btnRemove: "MwSt abziehen",
        resTotal: "Gesamtbetrag", resNet: "Nettobetrag", resVAT: "MwSt-Betrag"
      }
    };

    let currentRate = 20;

    function getLang() {
      const params = new URLSearchParams(window.location.search);
      return params.get('lang') || 'en';
    }

    function updateLanguage() {
      const lang = getLang();
      const data = i18n[lang] || i18n['en'];
      document.getElementById('page-title').innerText = data.title;
      document.getElementById('page-desc').innerText = data.desc;
      document.getElementById('label-amount').innerText = data.labelAmount;
      document.getElementById('label-rate').innerText = data.labelRate;
      document.getElementById('btn-add').innerText = data.btnAdd;
      document.getElementById('btn-remove').innerText = data.btnRemove;
      document.getElementById('res-label-total').innerText = data.resTotal;
      document.getElementById('res-label-net').innerText = data.resNet;
      document.getElementById('res-label-vat').innerText = data.resVAT;
      document.getElementById('lang-select').value = lang;
      document.getElementById('home-link').href = "/?lang=" + lang;
    }

    function setRate(rate, btn) {
      currentRate = parseFloat(rate) || 0;
      document.querySelectorAll('.rate-btn').forEach(b => b.classList.remove('active-rate', 'border-2'));
      if (btn) btn.classList.add('active-rate', 'border-2');
    }

    function calculateVAT(mode) {
      const amount = parseFloat(document.getElementById('amount-input').value);
      if (isNaN(amount) || amount <= 0) return;

      let net, vat, total;
      const rateFactor = currentRate / 100;

      if (mode === 'add') {
        net = amount;
        vat = amount * rateFactor;
        total = net + vat;
      } else {
        total = amount;
        net = amount / (1 + rateFactor);
        vat = total - net;
      }

      document.getElementById('result-area').classList.remove('hidden');
      document.getElementById('final-amount').innerText = "£" + total.toLocaleString(undefined, {minimumFractionDigits: 2});
      document.getElementById('val-net').innerText = "£" + net.toLocaleString(undefined, {minimumFractionDigits: 2});
      document.getElementById('val-vat').innerText = "£" + vat.toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    document.getElementById('lang-select').addEventListener('change', (e) => {
      const url = new URL(window.location.href);
      url.searchParams.set('lang', e.target.value);
      window.location.href = url.href;
    });

    window.onload = updateLanguage;
  </script>
</body>
</html>
