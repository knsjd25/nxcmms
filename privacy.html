    function updateLanguage() {
      const lang = new URLSearchParams(window.location.search).get('lang') || 'en';
      const data = i18n[lang] || i18n['en'];
      
      document.documentElement.lang = lang;
      
      // Update Meta
      document.title = data.metaTitle;
      document.querySelector('meta[name="description"]').setAttribute("content", data.metaDesc);

      // Update Navigation
      if (document.getElementById('nav-blog-text')) document.getElementById('nav-blog-text').innerText = data.navBlog;

      // Update Hero Section
      document.getElementById('hero-tag').innerText = data.heroTag;
      document.getElementById('hero-title').innerText = data.heroTitle;
      document.getElementById('hero-sub').innerText = data.heroSub;
      
      // Update Footer
      if (document.getElementById('footer-about')) document.getElementById('footer-about').innerText = data.footerAbout;
      if (document.getElementById('footer-blog')) document.getElementById('footer-blog').innerText = data.footerBlog;
      if (document.getElementById('footer-privacy')) document.getElementById('footer-privacy').innerText = data.footerPrivacy;
      if (document.getElementById('footer-contact')) document.getElementById('footer-contact').innerText = data.footerContact;
      
      // QDF 永动更新护城河
      const updateSpan = document.getElementById('last-updated-text');
      if (updateSpan && data.lastUpdated) {
          const now = new Date();
          now.setDate(now.getDate() - 1); 
          
          let locale = 'en-GB';
          if(lang === 'zh') locale = 'zh-CN';
          if(lang === 'es') locale = 'es-ES';
          if(lang === 'fr') locale = 'fr-FR';
          if(lang === 'de') locale = 'de-DE';
          
          const options = { year: 'numeric', month: 'long', day: 'numeric' };
          const formattedDate = now.toLocaleDateString(locale, options);
          updateSpan.innerText = data.lastUpdated + formattedDate;
      }
      
      // Inject SEO content
      const seoContainer = document.getElementById('seo-container');
      if (data.seoHtml) {
          seoContainer.style.opacity = 0;
          setTimeout(() => {
              seoContainer.innerHTML = data.seoHtml;
              seoContainer.style.opacity = 1;
          }, 150);
      }

      document.getElementById('lang-select').value = lang;
      
      // Clean URLs for internal links
      document.querySelectorAll('a').forEach(link => {
        const href = link.getAttribute('href');
        // Ignore external HTTP links
        if (href && !href.startsWith('http') && (href.startsWith('/') || (!href.includes(':') && !href.startsWith('#')))) {
          try {
            const url = new URL(href, window.location.origin);
            url.searchParams.set('lang', lang);
            link.href = url.pathname + url.search;
          } catch(e) {}
        }
      });
    }

    document.getElementById('lang-select').addEventListener('change', (e) => {
      const url = new URL(window.location.href);
      url.searchParams.set('lang', e.target.value);
      window.location.href = url.href;
    });

    window.onload = updateLanguage;
  </script>
</body>
