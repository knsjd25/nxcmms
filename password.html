<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Secure Password Generator — Mini-Tools.uk</title>
  <script async src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    .pwd-display { font-family: 'Monaco', 'Consolas', monospace; letter-spacing: 0.05em; }
    .strength-bar { transition: all 0.3s ease; height: 6px; border-radius: 3px; }
    input[type=range] { -webkit-appearance: none; background: #e2e8f0; height: 6px; border-radius: 5px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #2563eb; border-radius: 50%; cursor: pointer; border: 3px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <a href="/" id="home-link" class="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center text-white font-black shadow">M</a>
        <span class="text-xl font-extrabold text-slate-900 leading-none">Mini-Tools<span class="text-blue-600">.uk</span></span>
      </div>
      <select id="lang-select" class="bg-slate-100 px-3 py-1.5 rounded-lg text-sm font-bold outline-none cursor-pointer">
        <option value="en">🇬🇧 English</option>
        <option value="zh">🇨🇳 简体中文</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="de">🇩🇪 Deutsch</option>
      </select>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-6 py-12">
    <div class="mb-10 text-center">
      <h1 id="page-title" class="text-3xl font-extrabold text-slate-900 mb-2">Password Generator</h1>
      <p id="page-desc" class="text-slate-500">Create strong, secure passwords instantly on your device.</p>
    </div>

    <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm space-y-8">
      
      <div class="relative bg-slate-900 p-6 rounded-2xl flex items-center justify-between group">
        <div id="pwd-output" class="pwd-display text-2xl font-bold text-white overflow-hidden text-ellipsis mr-12">••••••••</div>
        <button onclick="copyPwd()" class="p-3 bg-white/10 hover:bg-white/20 text-white rounded-xl transition-all active:scale-95">
          <svg id="copy-icon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
          </svg>
        </button>
      </div>

      <div class="space-y-2">
        <div class="flex justify-between text-xs font-bold text-slate-400 uppercase tracking-widest">
          <span id="label-strength">Strength</span>
          <span id="strength-text">---</span>
        </div>
        <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
          <div id="strength-bar" class="strength-bar w-0 bg-slate-300"></div>
        </div>
      </div>

      <div class="space-y-6">
        <div>
          <div class="flex justify-between mb-4">
            <label id="label-length" class="text-sm font-bold text-slate-700">Length</label>
            <span id="length-val" class="text-blue-600 font-black text-lg">16</span>
          </div>
          <input type="range" id="input-length" min="6" max="50" value="16" class="w-full" oninput="updateConfig()">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100 transition-colors">
            <input type="checkbox" id="chk-upper" checked onchange="updateConfig()" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
            <span id="opt-upper" class="text-sm font-bold text-slate-700">Uppercase (ABC)</span>
          </label>
          <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100 transition-colors">
            <input type="checkbox" id="chk-lower" checked onchange="updateConfig()" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
            <span id="opt-lower" class="text-sm font-bold text-slate-700">Lowercase (abc)</span>
          </label>
          <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100 transition-colors">
            <input type="checkbox" id="chk-num" checked onchange="updateConfig()" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
            <span id="opt-num" class="text-sm font-bold text-slate-700">Numbers (123)</span>
          </label>
          <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100 transition-colors">
            <input type="checkbox" id="chk-sym" checked onchange="updateConfig()" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
            <span id="opt-sym" class="text-sm font-bold text-slate-700">Symbols (!@#)</span>
          </label>
        </div>
      </div>

      <button id="btn-gen" onclick="generate()" class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-2xl shadow-xl shadow-blue-100 transition-all active:scale-95 text-xl">
        Generate New Password
      </button>
    </div>
  </main>

  <script>
    const i18n = {
      en: {
        title: "Password Generator", desc: "Securely generate random passwords locally.",
        length: "Length", btnGen: "Generate New Password", strength: "Strength",
        optUpper: "Uppercase (ABC)", optLower: "Lowercase (abc)", optNum: "Numbers (123)", optSym: "Symbols (!@#)",
        levels: ["Weak", "Fair", "Good", "Strong"]
      },
      zh: {
        title: "随机密码生成器", desc: "在本地浏览器中安全地生成高强度随机密码。",
        length: "密码长度", btnGen: "生成新密码", strength: "安全性强度",
        optUpper: "大写字母 (ABC)", optLower: "小写字母 (abc)", optNum: "数字 (123)", optSym: "符号 (!@#)",
        levels: ["弱", "一般", "良好", "极强"]
      },
      es: {
        title: "Generador de Contraseñas", desc: "Genera contraseñas seguras localmente.",
        length: "Longitud", btnGen: "Generar Contraseña", strength: "Fortaleza",
        optUpper: "Mayúsculas", optLower: "Minúsculas", optNum: "Números", optSym: "Símbolos",
        levels: ["Débil", "Aceptable", "Buena", "Fuerte"]
      },
      fr: {
        title: "Générateur de Mots de Passe", desc: "Générez des mots de passe sécurisés.",
        length: "Longueur", btnGen: "Générer", strength: "Force",
        optUpper: "Majuscules", optLower: "Minuscules", optNum: "Chiffres", optSym: "Symboles",
        levels: ["Faible", "Moyen", "Bon", "Fort"]
      },
      de: {
        title: "Passwort-Generator", desc: "Sichere Passwörter lokal generieren.",
        length: "Länge", btnGen: "Passwort generieren", strength: "Stärke",
        optUpper: "Großbuchstaben", optLower: "Kleinbuchstaben", optNum: "Zahlen", optSym: "Symbole",
        levels: ["Schwach", "Mittel", "Gut", "Stark"]
      }
    };

    const charset = {
      upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      lower: 'abcdefghijklmnopqrstuvwxyz',
      num: '0123456789',
      sym: '!@#$%^&*()_+~`|}{[]:;?><,./-='
    };

    function getLang() {
      return new URLSearchParams(window.location.search).get('lang') || 'en';
    }

    function updateUI() {
      const lang = getLang();
      const data = i18n[lang] || i18n['en'];
      document.getElementById('page-title').innerText = data.title;
      document.getElementById('page-desc').innerText = data.desc;
      document.getElementById('label-length').innerText = data.length;
      document.getElementById('btn-gen').innerText = data.btnGen;
      document.getElementById('label-strength').innerText = data.strength;
      document.getElementById('opt-upper').innerText = data.optUpper;
      document.getElementById('opt-lower').innerText = data.optLower;
      document.getElementById('opt-num').innerText = data.optNum;
      document.getElementById('opt-sym').innerText = data.optSym;
      
      document.getElementById('lang-select').value = lang;
      document.getElementById('home-link').href = "/?lang=" + lang;
      generate();
    }

    function updateConfig() {
      document.getElementById('length-val').innerText = document.getElementById('input-length').value;
      generate();
    }

    function generate() {
      const len = document.getElementById('input-length').value;
      let chars = "";
      if(document.getElementById('chk-upper').checked) chars += charset.upper;
      if(document.getElementById('chk-lower').checked) chars += charset.lower;
      if(document.getElementById('chk-num').checked) chars += charset.num;
      if(document.getElementById('chk-sym').checked) chars += charset.sym;

      if(chars === "") {
        document.getElementById('pwd-output').innerText = "Select Options";
        return;
      }

      let password = "";
      const array = new Uint32Array(len);
      window.crypto.getRandomValues(array);
      
      for (let i = 0; i < len; i++) {
        password += chars[array[i] % chars.length];
      }

      document.getElementById('pwd-output').innerText = password;
      updateStrength(password, len);
    }

    function updateStrength(pwd, len) {
      let score = 0;
      if (len > 8) score++;
      if (len > 12) score++;
      if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++;
      if (/[0-9]/.test(pwd) && /[^A-Za-z0-9]/.test(pwd)) score++;
      
      const lang = getLang();
      const levels = i18n[lang].levels;
      const bar = document.getElementById('strength-bar');
      const text = document.getElementById('strength-text');
      
      const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-emerald-500'];
      const widths = ['w-1/4', 'w-2/4', 'w-3/4', 'w-full'];
      
      bar.className = `strength-bar h-full rounded-full transition-all duration-500 ${colors[score-1] || 'bg-slate-300'} ${widths[score-1] || 'w-0'}`;
      text.innerText = levels[score-1] || "---";
      text.className = `text-xs font-bold ${score > 2 ? 'text-emerald-600' : 'text-slate-400'}`;
    }

    function copyPwd() {
      const pwd = document.getElementById('pwd-output').innerText;
      if(pwd === "Select Options") return;
      navigator.clipboard.writeText(pwd).then(() => {
        const icon = document.getElementById('copy-icon');
        const original = icon.innerHTML;
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />';
        setTimeout(() => icon.innerHTML = original, 2000);
      });
    }

    document.getElementById('lang-select').addEventListener('change', (e) => {
      window.location.href = `?lang=${e.target.value}`;
    });

    window.onload = updateUI;
  </script>
</body>
</html>
