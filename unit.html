<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Unit Converter — Mini-Tools.uk</title>
  <script async src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    .unit-card { background: white; border: 1px solid #e2e8f0; }
    .result-display { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: white; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body>

  <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <a href="/" id="home-link" class="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center text-white font-black shadow">M</a>
        <span class="text-xl font-extrabold text-slate-900 leading-none">Mini-Tools<span class="text-blue-600">.uk</span></span>
      </div>
      <select id="lang-select" class="bg-slate-100 px-3 py-1.5 rounded-lg text-sm font-bold outline-none cursor-pointer">
        <option value="en">🇬🇧 English</option>
        <option value="zh">🇨🇳 简体中文</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="de">🇩🇪 Deutsch</option>
      </select>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-6 py-12">
    <div class="mb-10 text-center">
      <h1 id="page-title" class="text-3xl font-extrabold text-slate-900 mb-2">Unit Converter</h1>
      <p id="page-desc" class="text-slate-500">Quickly convert between Metric and Imperial units.</p>
    </div>

    <div class="grid grid-cols-1 gap-8">
      <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm space-y-8">
        
        <div class="flex justify-center gap-4 border-b border-slate-100 pb-6">
          <button onclick="setCategory('length', this)" class="cat-btn px-6 py-2 rounded-full bg-blue-600 text-white font-bold text-sm transition-all" id="btn-length">Length</button>
          <button onclick="setCategory('weight', this)" class="cat-btn px-6 py-2 rounded-full bg-slate-100 text-slate-600 font-bold text-sm transition-all" id="btn-weight">Weight</button>
          <button onclick="setCategory('temp', this)" class="cat-btn px-6 py-2 rounded-full bg-slate-100 text-slate-600 font-bold text-sm transition-all" id="btn-temp">Temp</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-[1fr,auto,1fr] gap-4 items-center">
          <div class="space-y-2">
            <input type="number" id="input-val" value="1" oninput="convert()" class="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-2xl font-bold outline-none focus:ring-2 focus:ring-blue-500 text-center">
            <select id="unit-from" onchange="convert()" class="w-full bg-transparent text-center font-bold text-slate-500 outline-none cursor-pointer"></select>
          </div>

          <button onclick="swapUnits()" class="p-3 bg-slate-100 hover:bg-slate-200 rounded-full transition-colors mx-auto">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
            </svg>
          </button>

          <div class="space-y-2">
            <div id="output-val" class="w-full px-4 py-4 bg-blue-50 border-2 border-blue-200 rounded-2xl text-2xl font-black text-blue-700 text-center overflow-hidden">0</div>
            <select id="unit-to" onchange="convert()" class="w-full bg-transparent text-center font-bold text-slate-500 outline-none cursor-pointer"></select>
          </div>
        </div>
      </div>

      <div id="formula-box" class="p-6 bg-slate-100 rounded-2xl text-center text-sm text-slate-500 italic">
        Select a category to start converting units.
      </div>
    </div>
  </main>

  <script>
    const i18n = {
      en: {
        title: "Unit Converter", desc: "Metric & Imperial quick swap.",
        length: "Length", weight: "Weight", temp: "Temperature",
        units: {
          m: "Meters (m)", km: "Kilometers (km)", ft: "Feet (ft)", in: "Inches (in)", mi: "Miles (mi)",
          kg: "Kilograms (kg)", g: "Grams (g)", lb: "Pounds (lb)", oz: "Ounces (oz)",
          c: "Celsius (°C)", f: "Fahrenheit (°F)", k: "Kelvin (K)"
        }
      },
      zh: {
        title: "单位换算器", desc: "公制与英制单位快速转换。",
        length: "长度", weight: "重量", temp: "温度",
        units: {
          m: "米 (m)", km: "千米 (km)", ft: "英尺 (ft)", in: "英寸 (in)", mi: "英里 (mi)",
          kg: "千克 (kg)", g: "克 (g)", lb: "磅 (lb)", oz: "盎司 (oz)",
          c: "摄氏度 (°C)", f: "华氏度 (°F)", k: "开尔文 (K)"
        }
      },
      es: {
        title: "Convertidor", desc: "Cambio rápido entre métrico e imperial.",
        length: "Longitud", weight: "Peso", temp: "Temperatura",
        units: {
          m: "Metros (m)", km: "Kilómetros (km)", ft: "Pies (ft)", in: "Pulgadas (in)", mi: "Millas (mi)",
          kg: "Kilogramos (kg)", g: "Gramos (g)", lb: "Libras (lb)", oz: "Onzas (oz)",
          c: "Celsius (°C)", f: "Fahrenheit (°F)", k: "Kelvin (K)"
        }
      },
      fr: {
        title: "Convertisseur", desc: "Conversion métrique et impériale.",
        length: "Longueur", weight: "Poids", temp: "Température",
        units: {
          m: "Mètres (m)", km: "Kilomètres (km)", ft: "Pieds (ft)", in: "Pouces (in)", mi: "Milles (mi)",
          kg: "Kilogrammes (kg)", g: "Grammes (g)", lb: "Livres (lb)", oz: "Onces (oz)",
          c: "Celsius (°C)", f: "Fahrenheit (°F)", k: "Kelvin (K)"
        }
      },
      de: {
        title: "Einheiten-Umrechner", desc: "Metrische & imperiale Umrechnung.",
        length: "Länge", weight: "Gewicht", temp: "Temperatur",
        units: {
          m: "Meter (m)", km: "Kilometer (km)", ft: "Fuß (ft)", in: "Zoll (in)", mi: "Meilen (mi)",
          kg: "Kilogramm (kg)", g: "Gramm (g)", lb: "Pfund (lb)", oz: "Unzen (oz)",
          c: "Celsius (°C)", f: "Fahrenheit (°F)", k: "Kelvin (K)"
        }
      }
    };

    const conversionRates = {
      length: { m: 1, km: 1000, ft: 0.3048, in: 0.0254, mi: 1609.34 },
      weight: { kg: 1, g: 0.001, lb: 0.453592, oz: 0.0283495 }
    };

    let currentCategory = 'length';

    function getLang() {
      return new URLSearchParams(window.location.search).get('lang') || 'en';
    }

    function setCategory(cat, btn) {
      currentCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.replace('bg-blue-600', 'bg-slate-100') || b.classList.replace('text-white', 'text-slate-600'));
      btn.classList.replace('bg-slate-100', 'bg-blue-600');
      btn.classList.replace('text-slate-600', 'text-white');
      populateUnits();
    }

    function populateUnits() {
      const lang = getLang();
      const unitData = i18n[lang].units;
      const fromSelect = document.getElementById('unit-from');
      const toSelect = document.getElementById('unit-to');
      
      let options = '';
      const availableUnits = currentCategory === 'temp' ? ['c', 'f', 'k'] : Object.keys(conversionRates[currentCategory]);
      
      availableUnits.forEach(u => {
        options += `<option value="${u}">${unitData[u]}</option>`;
      });

      fromSelect.innerHTML = options;
      toSelect.innerHTML = options;
      toSelect.selectedIndex = 1;
      convert();
    }

    function convert() {
      const val = parseFloat(document.getElementById('input-val').value);
      const from = document.getElementById('unit-from').value;
      const to = document.getElementById('unit-to').value;
      if (isNaN(val)) return;

      let result;
      if (currentCategory === 'temp') {
        result = convertTemp(val, from, to);
      } else {
        const inBase = val * conversionRates[currentCategory][from];
        result = inBase / conversionRates[currentCategory][to];
      }

      document.getElementById('output-val').innerText = result.toLocaleString(undefined, {maximumFractionDigits: 4});
    }

    function convertTemp(v, f, t) {
      let c;
      if (f === 'c') c = v;
      else if (f === 'f') c = (v - 32) * 5/9;
      else if (f === 'k') c = v - 273.15;

      if (t === 'c') return c;
      if (t === 'f') return (c * 9/5) + 32;
      if (t === 'k') return c + 273.15;
    }

    function swapUnits() {
      const from = document.getElementById('unit-from');
      const to = document.getElementById('unit-to');
      const temp = from.value;
      from.value = to.value;
      to.value = temp;
      convert();
    }

    function updateLanguage() {
      const lang = getLang();
      const data = i18n[lang] || i18n['en'];
      document.getElementById('page-title').innerText = data.title;
      document.getElementById('page-desc').innerText = data.desc;
      document.getElementById('btn-length').innerText = data.length;
      document.getElementById('btn-weight').innerText = data.weight;
      document.getElementById('btn-temp').innerText = data.temp;
      document.getElementById('lang-select').value = lang;
      document.getElementById('home-link').href = "/?lang=" + lang;
      populateUnits();
    }

    document.getElementById('lang-select').addEventListener('change', (e) => {
      window.location.href = `?lang=${e.target.value}`;
    });

    window.onload = updateLanguage;
  </script>
</body>
</html>
