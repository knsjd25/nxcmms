<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QR Code Generator — Mini-Tools.uk</title>
  <script async src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    .qr-container { background: white; border: 2px dashed #e2e8f0; }
    #qrcode img { margin: 0 auto; border: 8px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
  </style>
</head>
<body>

  <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <a href="/" id="home-link" class="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center text-white font-black shadow">M</a>
        <span class="text-xl font-extrabold text-slate-900 leading-none">Mini-Tools<span class="text-blue-600">.uk</span></span>
      </div>
      <select id="lang-select" class="bg-slate-100 px-3 py-1.5 rounded-lg text-sm font-bold outline-none cursor-pointer">
        <option value="en">🇬🇧 English</option>
        <option value="zh">🇨🇳 简体中文</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="de">🇩🇪 Deutsch</option>
      </select>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-6 py-12">
    <div class="mb-10 text-center">
      <h1 id="page-title" class="text-3xl font-extrabold text-slate-900 mb-2">QR Code Generator</h1>
      <p id="page-desc" class="text-slate-500">Create custom QR codes for URLs, text, or Wi-Fi instantly.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
      <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm space-y-6">
        <div>
          <label id="label-content" class="block text-sm font-bold text-slate-700 mb-2">Content / URL</label>
          <textarea id="qr-input" rows="4" placeholder="https://mini-tools.uk" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-medium outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label id="label-size" class="block text-sm font-bold text-slate-700 mb-2">Size (px)</label>
            <select id="qr-size" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none">
              <option value="128">128x128</option>
              <option value="256" selected>256x256</option>
              <option value="512">512x512</option>
            </select>
          </div>
          <div>
            <label id="label-level" class="block text-sm font-bold text-slate-700 mb-2">Error Correction</label>
            <select id="qr-level" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none">
              <option value="L">Low (7%)</option>
              <option value="M" selected>Medium (15%)</option>
              <option value="Q">Quartile (25%)</option>
              <option value="H">High (30%)</option>
            </select>
          </div>
        </div>

        <button id="btn-generate" onclick="generateQR()" class="w-full py-4 bg-slate-900 hover:bg-black text-white font-black rounded-2xl shadow-lg transition-all active:scale-95 text-lg">
          Generate QR Code
        </button>
      </div>

      <div class="flex flex-col items-center">
        <div class="qr-container p-6 rounded-3xl mb-8">
          <div id="qrcode"></div>
        </div>
        
        <div id="action-area" class="hidden w-full max-w-xs space-y-3">
          <button id="btn-download" onclick="downloadQR()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2">
            Download PNG
          </button>
          <p class="text-center text-xs text-slate-400">Right-click on the image to save or share.</p>
        </div>
      </div>
    </div>
  </main>

  <script>
    const i18n = {
      en: {
        title: "QR Code Generator", desc: "Create custom QR codes for URLs or text instantly.",
        labelContent: "Content / URL", labelSize: "Size (px)", labelLevel: "Error Correction",
        btnGen: "Generate QR Code", btnDown: "Download PNG"
      },
      zh: {
        title: "二维码生成器", desc: "即时为网址、文本或信息创建自定义二维码。",
        labelContent: "内容 / 网址", labelSize: "尺寸 (像素)", labelLevel: "容错率",
        btnGen: "生成二维码", btnDown: "下载图片 (PNG)"
      },
      es: {
        title: "Generador de QR", desc: "Crea códigos QR personalizados para URL o texto.",
        labelContent: "Contenido / URL", labelSize: "Tamaño (px)", labelLevel: "Corrección de Errores",
        btnGen: "Generar Código QR", btnDown: "Descargar PNG"
      },
      fr: {
        title: "Générateur de Code QR", desc: "Créez instantanément des codes QR pour vos URL ou textes.",
        labelContent: "Contenu / URL", labelSize: "Taille (px)", labelLevel: "Correction d'Erreurs",
        btnGen: "Générer le Code QR", btnDown: "Télécharger PNG"
      },
      de: {
        title: "QR-Code Generator", desc: "Erstellen Sie sofort QR-Codes für URLs oder Texte.",
        labelContent: "Inhalt / URL", labelSize: "Größe (px)", labelLevel: "Fehlerkorrektur",
        btnGen: "QR-Code generieren", btnDown: "Download PNG"
      }
    };

    let qrInstance = null;

    function getLang() {
      const params = new URLSearchParams(window.location.search);
      return params.get('lang') || 'en';
    }

    function updateLanguage() {
      const lang = getLang();
      const data = i18n[lang] || i18n['en'];

      document.getElementById('page-title').innerText = data.title;
      document.getElementById('page-desc').innerText = data.desc;
      document.getElementById('label-content').innerText = data.labelContent;
      document.getElementById('label-size').innerText = data.labelSize;
      document.getElementById('label-level').innerText = data.labelLevel;
      document.getElementById('btn-generate').innerText = data.btnGen;
      document.getElementById('btn-download').innerText = data.btnDown;
      
      document.getElementById('lang-select').value = lang;
      document.getElementById('home-link').href = "/?lang=" + lang;
    }

    function generateQR() {
      const content = document.getElementById('qr-input').value || "https://mini-tools.uk";
      const size = parseInt(document.getElementById('qr-size').value);
      const level = document.getElementById('qr-level').value;

      const container = document.getElementById("qrcode");
      container.innerHTML = ""; // 清空旧的

      qrInstance = new QRCode(container, {
        text: content,
        width: size,
        height: size,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel[level]
      });

      document.getElementById('action-area').classList.remove('hidden');
    }

    function downloadQR() {
      const img = document.querySelector('#qrcode img');
      if (!img) return;
      
      const link = document.createElement('a');
      link.download = 'qrcode-minitools.png';
      link.href = img.src;
      link.click();
    }

    document.getElementById('lang-select').addEventListener('change', (e) => {
      const url = new URL(window.location.href);
      url.searchParams.set('lang', e.target.value);
      window.location.href = url.href;
    });

    window.onload = () => {
      updateLanguage();
      generateQR(); // 默认生成一个
    };
  </script>
</body>
</html>
