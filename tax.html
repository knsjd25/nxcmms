<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UK Income Tax Calculator (PAYE) — Mini-Tools.uk</title>
  <script async src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    .result-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body>

  <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <a href="/" id="home-link" class="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center text-white font-black shadow">M</a>
        <span class="text-xl font-extrabold text-slate-900 leading-none">Mini-Tools<span class="text-blue-600">.uk</span></span>
      </div>
      <select id="lang-select" class="bg-slate-100 px-3 py-1.5 rounded-lg text-sm font-bold outline-none cursor-pointer">
        <option value="en">🇬🇧 English</option>
        <option value="zh">🇨🇳 简体中文</option>
      </select>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-6 py-12">
    <div class="mb-10 text-center lg:text-left">
      <h1 id="page-title" class="text-3xl font-extrabold text-slate-900 mb-2">UK Income Tax Calculator</h1>
      <p id="page-desc" class="text-slate-500">Calculate your take-home pay after PAYE tax and National Insurance.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
        <div class="mb-6">
          <label id="label-salary" class="block text-sm font-bold text-slate-700 mb-2">Annual Gross Salary (£)</label>
          <input type="number" id="salary-input" placeholder="e.g. 35000" class="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-xl font-bold focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>
        
        <div class="mb-8">
          <label id="label-taxyear" class="block text-sm font-bold text-slate-700 mb-2">Tax Year</label>
          <div class="grid grid-cols-2 gap-3">
            <button class="py-3 rounded-xl border-2 border-blue-600 bg-blue-50 text-blue-700 font-bold text-sm">2024 / 2025</button>
            <button class="py-3 rounded-xl border border-slate-200 text-slate-400 font-bold text-sm cursor-not-allowed" disabled>2025 / 2026</button>
          </div>
        </div>

        <button id="btn-calc" onclick="calculateTax()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-2xl shadow-lg shadow-blue-200 transition-all transform active:scale-95 text-lg">
          Calculate Now
        </button>
      </div>

      <div id="result-area" class="result-card p-8 rounded-3xl shadow-2xl flex flex-col justify-between hidden">
        <div>
          <p id="res-label-takehome" class="text-slate-400 font-bold text-sm uppercase tracking-widest mb-1">Estimated Take-home</p>
          <h2 id="final-salary" class="text-5xl font-black text-white mb-6">£0.00</h2>
          
          <div class="space-y-4 border-t border-white/10 pt-6 text-sm">
            <div class="flex justify-between">
              <span id="res-label-gross" class="text-slate-400">Gross Income</span>
              <span id="res-val-gross" class="font-bold">£0.00</span>
            </div>
            <div class="flex justify-between">
              <span id="res-label-tax" class="text-slate-400">Income Tax (PAYE)</span>
              <span id="res-val-tax" class="text-red-400 font-bold">- £0.00</span>
            </div>
            <div class="flex justify-between">
              <span id="res-label-ni" class="text-slate-400">National Insurance</span>
              <span id="res-val-ni" class="text-red-400 font-bold">- £0.00</span>
            </div>
          </div>
        </div>

        <div class="mt-8 p-4 bg-white/5 rounded-2xl text-xs text-slate-400 leading-relaxed italic">
          * This calculation is an estimate based on standard UK tax codes (1257L).
        </div>
      </div>
    </div>
  </main>

  <script>
    const i18n = {
      en: {
        title: "UK Income Tax Calculator",
        desc: "Calculate your take-home pay after PAYE tax and National Insurance.",
        labelSalary: "Annual Gross Salary (£)",
        labelTaxYear: "Tax Year",
        btnCalc: "Calculate Now",
        resTakehome: "Estimated Take-home",
        resGross: "Gross Income",
        resTax: "Income Tax (PAYE)",
        resNI: "National Insurance"
      },
      zh: {
        title: "英国个税计算器 (PAYE)",
        desc: "快速计算扣除个人所得税和国民保险(NI)后的实际到手工资。",
        labelSalary: "年薪总额 (£)",
        labelTaxYear: "税务年度",
        btnCalc: "立即计算",
        resTakehome: "预计到手薪资",
        resGross: "税前年薪",
        resTax: "个人所得税 (PAYE)",
        resNI: "国民保险 (NI)"
      }
    };

    // 1. 获取 URL 中的语言参数
    function getLang() {
      const params = new URLSearchParams(window.location.search);
      return params.get('lang') || 'en';
    }

    // 2. 更新界面语言
    function updateLanguage() {
      const lang = getLang();
      const data = i18n[lang] || i18n['en'];

      document.getElementById('page-title').innerText = data.title;
      document.getElementById('page-desc').innerText = data.desc;
      document.getElementById('label-salary').innerText = data.labelSalary;
      document.getElementById('label-taxyear').innerText = data.labelTaxYear;
      document.getElementById('btn-calc').innerText = data.btnCalc;
      document.getElementById('res-label-takehome').innerText = data.resTakehome;
      document.getElementById('res-label-gross').innerText = data.resGross;
      document.getElementById('res-label-tax').innerText = data.resTax;
      document.getElementById('res-label-ni').innerText = data.resNI;
      
      document.getElementById('lang-select').value = lang;
      
      // 让 Logo 返回首页时也带着语言
      document.getElementById('home-link').href = "/?lang=" + lang;
    }

    // 3. 英国个税计算逻辑 (2024/25 标准)
    function calculateTax() {
      const salary = parseFloat(document.getElementById('salary-input').value);
      if (isNaN(salary) || salary <= 0) return;

      let tax = 0;
      let ni = 0;
      const allowance = 12570;

      // PAYE 计算
      if (salary > 125140) {
        // 超过12.5万没有免税额
        tax = (salary - 125140) * 0.45 + (125140 - 50270) * 0.4 + (50270 - 0) * 0.2; 
        // 简化算法，实际更复杂，此为估算
      } else {
        const taxable = Math.max(0, salary - allowance);
        if (taxable <= 37700) {
          tax = taxable * 0.2;
        } else if (taxable <= 125140) {
          tax = (37700 * 0.2) + (taxable - 37700) * 0.4;
        }
      }

      // NI 计算 (2024年4月起 雇员NI降至 8%)
      const niThreshold = 12570;
      if (salary > niThreshold) {
        ni = (Math.min(salary, 50270) - niThreshold) * 0.08;
        if (salary > 50270) {
          ni += (salary - 50270) * 0.02;
        }
      }

      const takeHome = salary - tax - ni;

      // 显示结果
      document.getElementById('result-area').classList.remove('hidden');
      document.getElementById('final-salary').innerText = "£" + (takeHome / 12).toLocaleString(undefined, {minimumFractionDigits: 2}) + " /mo";
      document.getElementById('res-val-gross').innerText = "£" + salary.toLocaleString();
      document.getElementById('res-val-tax').innerText = "- £" + tax.toLocaleString(undefined, {maximumFractionDigits: 0});
      document.getElementById('res-val-ni').innerText = "- £" + ni.toLocaleString(undefined, {maximumFractionDigits: 0});
    }

    // 语言切换处理
    document.getElementById('lang-select').addEventListener('change', (e) => {
      const url = new URL(window.location.href);
      url.searchParams.set('lang', e.target.value);
      window.location.href = url.href;
    });

    window.onload = updateLanguage;
  </script>
</body>
</html>
