<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Image Optimizer & Tuner — Mini-Tools.uk</title>
  <script async src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    .drop-zone { border: 3px dashed #e2e8f0; transition: all 0.3s ease; }
    .drop-zone.active { border-color: #2563eb; background-color: #eff6ff; }
    .preview-canvas { box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 4px solid white; max-width: 100%; height: auto; }
    input[type=range] { -webkit-appearance: none; background: #e2e8f0; height: 6px; border-radius: 5px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #2563eb; border-radius: 50%; cursor: pointer; border: 3px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <a href="/" id="home-link" class="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center text-white font-black shadow">M</a>
        <span class="text-xl font-extrabold text-slate-900 leading-none">Mini-Tools<span class="text-blue-600">.uk</span></span>
      </div>
      <select id="lang-select" class="bg-slate-100 px-3 py-1.5 rounded-lg text-sm font-bold outline-none cursor-pointer">
        <option value="en">🇬🇧 English</option>
        <option value="zh">🇨🇳 简体中文</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="de">🇩🇪 Deutsch</option>
      </select>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-6 py-12">
    <div class="mb-10 text-center lg:text-left">
      <h1 id="page-title" class="text-3xl font-extrabold text-slate-900 mb-2">Image Optimizer</h1>
      <p id="page-desc" class="text-slate-500">Tune, compress, and resize images locally. 100% secure.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
      
      <div class="lg:col-span-1 space-y-6">
        <div id="drop-area" class="drop-zone bg-white rounded-3xl p-10 text-center cursor-pointer">
          <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" class="hidden">
          <div class="flex flex-col items-center">
            <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mb-4 text-blue-600">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
            </div>
            <h3 id="label-upload" class="font-bold text-slate-700 mb-1">Click or Drag Image</h3>
            <p class="text-xs text-slate-400 uppercase tracking-widest font-bold">Local Only</p>
          </div>
        </div>

        <div id="config-area" class="hidden bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-5">
          <label id="label-config" class="block text-xs font-black uppercase tracking-widest text-slate-400 border-b border-slate-100 pb-3">Tuning Options</label>
          
          <div>
            <label id="label-format" class="block text-sm font-bold text-slate-700 mb-2">Output Format</label>
            <select id="output-format" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-bold outline-none cursor-pointer">
              <option value="image/jpeg">JPEG (Lossy)</option>
              <option value="image/png">PNG (Lossless)</option>
              <option value="image/webp">WEBP (Modern)</option>
            </select>
          </div>

          <div>
            <div class="flex justify-between mb-2">
              <label id="label-quality" class="text-sm font-bold text-slate-700">Quality (JPEG/WEBP)</label>
              <span id="quality-val" class="text-sm text-blue-600 font-bold">85</span>
            </div>
            <input type="range" id="output-quality" min="10" max="100" value="85" class="w-full">
          </div>

          <div>
            <label id="label-resize" class="block text-sm font-bold text-slate-700 mb-2">Resize (Pixels)</label>
            <div class="flex gap-2 items-center text-sm font-bold text-slate-400 editor-font">
              <input type="number" id="resize-width" placeholder="W" class="w-24 px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none text-slate-900 text-center">
              ×
              <input type="number" id="resize-height" placeholder="H" class="w-24 px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none text-slate-900 text-center">
            </div>
          </div>

          <button id="btn-process" onclick="optimizeImage()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-xl shadow-lg transition-all active:scale-95 text-sm">
            Optimize Now
          </button>
        </div>
      </div>

      <div class="lg:col-span-2 bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
        <div id="label-comparison" class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-6 border-b border-slate-100 pb-4">Comparison</div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-center">
          <div class="space-y-4">
            <span id="res-label-original" class="inline-block px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-xs font-bold">Original</span>
            <p id="val-original-meta" class="text-sm font-medium text-slate-500">---</p>
            <div class="flex items-center justify-center p-2 bg-slate-50 rounded-2xl min-h-[200px]">
              <img id="original-preview" class="hidden preview-canvas rounded-lg">
              <div id="original-placeholder" class="text-slate-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="1"/></svg>
              </div>
            </div>
          </div>
          
          <div class="space-y-4">
            <span id="res-label-optimized" class="inline-block px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold">Optimized</span>
            <p id="val-optimized-meta" class="text-sm font-bold text-green-600">---</p>
            <div class="flex items-center justify-center p-2 bg-green-50 rounded-2xl min-h-[200px] relative">
              <canvas id="optimized-preview" class="hidden preview-canvas rounded-lg"></canvas>
              <div id="optimized-placeholder" class="text-green-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="1"/></svg>
              </div>
            </div>
            <a id="btn-download" class="hidden w-full max-w-xs mx-auto py-3 bg-slate-900 hover:bg-black text-white font-black rounded-xl shadow-xl flex items-center justify-center gap-2 transition-all active:scale-95 text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
              Download Tuned Image
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const i18n = {
      en: {
        title: "Image Optimizer", desc: "Tune, compress, and resize images locally.",
        upload: "Click or Drag Image", config: "Tuning Options", format: "Output Format",
        quality: "Quality", resize: "Resize (Pixels)", btnProc: "Optimize Now",
        comparison: "Comparison", resOriginal: "Original", resOptimized: "Optimized",
        btnDownload: "Download Tuned Image"
      },
      zh: {
        title: "图片调优与优化", desc: "在本地浏览器调整图片、压缩体积及修改尺寸。100% 安全。",
        upload: "点击或拖拽图片文件至此", config: "调优配置", format: "输出格式",
        quality: "压缩质量 (0-100)", resize: "修改尺寸 (像素)", btnProc: "开始调优",
        comparison: "效果对比", resOriginal: "原始图片", resOptimized: "调优后",
        btnDownload: "下载优化后的图片"
      },
      es: {
        title: "Optimizador de Imagen", desc: "Ajusta, comprime y redimensiona imágenes localmente.",
        upload: "Clic o arrastra imagen aquí", config: "Opciones de Ajuste", format: "Formato de Salida",
        quality: "Calidad", resize: "Redimensionar", btnProc: "Optimizar Ahora",
        comparison: "Comparación", resOriginal: "Original", resOptimized: "Optimizado",
        btnDownload: "Descargar Imagen Optimizada"
      },
      fr: {
        title: "Optimiseur d'Image", desc: "Ajustez, compressez et redimensionnez des images.",
        upload: "Cliquez ou glissez l'image", config: "Options de Réglage", format: "Format de Sortie",
        quality: "Qualité", resize: "Redimensionner", btnProc: "Optimiser",
        comparison: "Comparaison", resOriginal: "Original", resOptimized: "Optimisé",
        btnDownload: "Télécharger"
      },
      de: {
        title: "Bildoptimierer", desc: "Bilder lokal anpassen, komprimieren und skalieren.",
        upload: "Bild hierher ziehen oder klicken", config: "Anpassungsoptionen", format: "Ausgabeformat",
        quality: "Qualität", resize: "Größe ändern", btnProc: "Optimieren",
        comparison: "Vergleich", resOriginal: "Original", resOptimized: "Optimiert",
        btnDownload: "Herunterladen"
      }
    };

    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('file-input');
    const configArea = document.getElementById('config-area');
    const originalPreview = document.getElementById('original-preview');
    const originalPlaceholder = document.getElementById('original-placeholder');
    const optimizedCanvas = document.getElementById('optimized-preview');
    const optimizedPlaceholder = document.getElementById('optimized-placeholder');
    const downloadBtn = document.getElementById('btn-download');
    
    let originalFile = null;
    let currentImage = null; // 用于存储加载的 Image 对象

    function getLang() {
      const params = new URLSearchParams(window.location.search);
      return params.get('lang') || 'en';
    }

    function updateUI() {
      const lang = getLang();
      const data = i18n[lang] || i18n['en'];
      document.getElementById('page-title').innerText = data.title;
      document.getElementById('page-desc').innerText = data.desc;
      document.getElementById('label-upload').innerText = data.upload;
      document.getElementById('label-config').innerText = data.config;
      document.getElementById('label-format').innerText = data.format;
      document.getElementById('label-quality').innerText = data.quality;
      document.getElementById('label-resize').innerText = data.resize;
      document.getElementById('btn-process').innerText = data.btnProc;
      document.getElementById('label-comparison').innerText = data.comparison;
      document.getElementById('res-label-original').innerText = data.resOriginal;
      document.getElementById('res-label-optimized').innerText = data.resOptimized;
      document.getElementById('btn-download').childNodes[2].nodeValue = " " + data.btnDownload; // 保持 SVG 图标
      document.getElementById('lang-select').value = lang;
      document.getElementById('home-link').href = "/?lang=" + lang;
    }

    // 交互事件
    dropArea.onclick = () => fileInput.click();
    dropArea.ondragover = (e) => { e.preventDefault(); dropArea.classList.add('active'); };
    dropArea.ondragleave = () => dropArea.classList.remove('active');
    dropArea.ondrop = (e) => { e.preventDefault(); dropArea.classList.remove('active'); const file = e.dataTransfer.files[0]; if (file) loadFile(file); };
    fileInput.onchange = (e) => { const file = e.target.files[0]; if (file) loadFile(file); };
    
    // 更新质量数值显示
    document.getElementById('output-quality').oninput = (e) => document.getElementById('quality-val').innerText = e.target.value;

    function loadFile(file) {
      if (!file.type.startsWith('image/')) return;
      originalFile = file;
      
      const reader = new FileReader();
      reader.onload = (e) => {
        currentImage = new Image();
        currentImage.onload = () => {
          // 显示原始图片信息
          originalPlaceholder.classList.add('hidden');
          originalPreview.src = e.target.result;
          originalPreview.classList.remove('hidden');
          document.getElementById('val-original-meta').innerText = `${file.name} | ${formatBytes(file.size)} | ${currentImage.width}x${currentImage.height}px`;
          
          // 初始化配置参数
          document.getElementById('resize-width').value = currentImage.width;
          document.getElementById('resize-height').value = currentImage.height;
          configArea.classList.remove('hidden');
          
          // 预设如果原图已经是 PNG 且尺寸不大，建议转换 WebP 或 JPEG 以节省空间
          if(file.type === 'image/png' && file.size > 200000) {
            document.getElementById('output-format').value = 'image/webp';
          }
        };
        currentImage.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    async function optimizeImage() {
      if (!currentImage) return;

      const format = document.getElementById('output-format').value;
      const quality = parseInt(document.getElementById('output-quality').value) / 100;
      let targetWidth = parseInt(document.getElementById('resize-width').value) || currentImage.width;
      let targetHeight = parseInt(document.getElementById('resize-height').value) || currentImage.height;

      // 创建 Canvas 进行调优
      const canvas = optimizedCanvas;
      const ctx = canvas.getContext('2d');
      canvas.width = targetWidth;
      canvas.height = targetHeight;
      
      // 平滑设置 (很重要)
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';

      // 如果目标是 JPEG，Canvas 背景需要填充白底，PNG不支持透明度转换JPEG
      if (format === 'image/jpeg') {
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, targetWidth, targetHeight);
      }

      ctx.drawImage(currentImage, 0, 0, targetWidth, targetHeight);

      // 将 Canvas 转换为 Blob
      const resultBlob = await new Promise(resolve => canvas.toBlob(resolve, format, quality));
      
      if (resultBlob) {
        optimizedPlaceholder.classList.add('hidden');
        canvas.classList.remove('hidden');
        
        // 更新调优后元数据
        const savings = ((originalFile.size - resultBlob.size) / originalFile.size * 100).toFixed(1);
        document.getElementById('val-optimized-meta').innerText = `${formatBytes(resultBlob.size)} | Saved: ${savings}%`;
        
        // 配置下载按钮
        const url = URL.createObjectURL(resultBlob);
        downloadBtn.href = url;
        const newFileName = originalFile.name.split('.').slice(0, -1).join('.') + '-min.' + format.split('/')[1];
        downloadBtn.download = newFileName;
        downloadBtn.classList.remove('hidden');
      }
    }

    function formatBytes(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    document.getElementById('lang-select').addEventListener('change', (e) => {
      const url = new URL(window.location.href);
      url.searchParams.set('lang', e.target.value);
      window.location.href = url.href;
    });

    window.onload = updateUI;
  </script>
</body>
</html>
